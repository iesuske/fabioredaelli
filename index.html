<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fabio Hot Stuff Redaelli</title>
    
    <style>
        /* Reset iniziale dei margini del browser */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* Registriamo il font che hai caricato su GitHub */
        @font-face {
            font-family: 'GutteryFont';
            src: url('fonts/guttery.otf') format('opentype');
            font-weight: normal;
            font-style: normal;
        }

        /* Sfondo nero e allineamento in alto a sinistra */
        body {
            background-color: #000000;
            color: #ffffff;
            height: 100vh;
            display: flex;
            justify-content: flex-start; /* Allinea a sinistra */
            align-items: flex-start;     /* Allinea in alto */
            padding: 60px;               /* Distanza dai bordi dello schermo */
            overflow: hidden;
        }

        /* Stile del nome con dimensione ridotta */
        .brand-name {
            font-family: 'GutteryFont', sans-serif;
            font-size: 4.5vw;            /* Dimensione ridotta per non farla risultare troppo grande */
            line-height: 1.0;            /* Regolata la spaziatura tra le righe */
            text-transform: uppercase;
            letter-spacing: -1px;        /* Lettere ravvicinate */
            text-align: left;            /* Forza l'allineamento del testo a sinistra */
        }

        /* Colore rosso per la parte "Hot Stuff" */
        .highlight {
            color: #ff3333;              /* Rosso acceso stile fumetto/adv */
        }
    </style>
</head>
<body>

    <h1 class="brand-name">
        Fabio <br>
        <span class="highlight">Hot Stuff</span> <br>
        Redaelli
    </h1>

</body>
</html>
