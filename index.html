<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fabio Hot Stuff Redaelli - Comic Art Author -</title>
    <style>
        @font-face {
            font-family: 'Lobster Regular';
            src: url('fonts/lobsteregular.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fceecb;
        }

        .bg-artwork {
            position: absolute;
            inset: 0;
            background-image: url('images/bg2.jpg');
            background-size: cover;
            background-position: center 18%; 
            background-repeat: no-repeat;
            z-index: 1;
        }

        .content-overlay {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            pointer-events: none;
        }

        header {
            width: 100%;
            /* ALZATO IL TITOLO: Ridotto da 52px a 30px */
            margin-top: 30px; 
            padding: 0 4%;
            pointer-events: auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        .brand-title {
            font-family: 'Lobster Regular', cursive;
            font-size: 5.5rem; 
            letter-spacing: 1px;
            text-align: center;
            white-space: nowrap;
            line-height: 1.2; 
            display: flex;
            justify-content: center;
            align-items: center;
            text-shadow: 1px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .text-white { color: #ffffff; }
        .text-black { color: #000000; }

        .sub-nav {
            width: 100%;
            padding: 0 4%;
            display: flex;
            justify-content: flex-end; 
            gap: 3cm;
            pointer-events: auto;
            margin-top: 0; 
        }

        .dropdown {
            position: relative;
            display: inline-block;
        }

        .dropdown-trigger {
            font-family: 'Lobster Regular', cursive;
            color: #ffffff; 
            font-size: 1.8rem;
            text-decoration: none;
            cursor: pointer;
            padding: 10px 15px;
            transition: color 0.2s ease;
            white-space: nowrap;
            text-shadow: 1px 2px 4px rgba(0, 0, 0, 0.4);
        }

        .dropdown:hover .dropdown-trigger {
            color: #b72216;
        }

        .dropdown-menu {
            display: none;
            position: absolute;
            right: 50%;
            transform: translateX(50%); 
            top: 100%;
            margin-top: 2px; 
            background: #000000; 
            box-shadow: 0px 12px 32px rgba(0,0,0,0.55);
            border-radius: 45px / 55px;
            border: none;
            list-style: none;
            padding: 0 0; 
            z-index: 10;
            overflow: hidden; 
        }

        .menu-about { width: max-content; min-width: 245px; max-width: 290px; }
        .menu-contact { width: max-content; min-width: 190px; }

        .dropdown-menu li { margin: 0; width: 100%; display: block; }

        .dropdown-menu li a {
            font-family: 'Lobster Regular', cursive;
            color: #ffffff; 
            padding: 5px 20px; 
            text-decoration: none;
            display: block;
            width: 100%;
            font-size: 1.3rem; 
            text-align: center; 
            letter-spacing: 0.8px;
            line-height: 1.4; 
            transition: background-color 0.15s ease;
            white-space: nowrap; 
        }

        .menu-about li a { white-space: normal; text-align: center; padding: 5px 24px; }
        .dropdown-menu li:first-child a { padding-top: 14px; } 
        .dropdown-menu li:last-child a { padding-bottom: 14px; } 

        .dropdown-menu li a:hover {
            background: #b72216; 
            color: #ffffff;
        }

        .dropdown:hover .dropdown-menu {
            display: block;
            animation: fadeInDropdown 0.2s ease-out;
        }

        @keyframes fadeInDropdown {
            from { opacity: 0; transform: translate(50%, -5px); }
            to { opacity: 1; transform: translate(50%, 0); }
        }

        main { flex-grow: 1; pointer-events: none; }

        footer {
            padding: 15px;
            text-align: center;
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.85rem;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.8);
            pointer-events: auto;
            background: rgba(13, 27, 42, 0.6);
            backdrop-filter: blur(4px);
            width: 100%;
        }

        @media (max-width: 768px) {
            .sub-nav { 
                justify-content: center; 
                margin-top: 0;
                padding: 10px 0; 
                gap: 30px; 
                background-color: #b72216; 
            }
            .dropdown-menu li a { 
                padding: 2px 15px 8px 15px; 
                font-size: 1.1rem; 
            }
            .dropdown-menu li:first-child a { padding-top: 8px; }
            .dropdown-menu li:last-child a { padding-bottom: 8px; }
        }
    </style>
</head>
<body>

    <div class="bg-artwork"></div>

    <div class="content-overlay">
        <header>
            <h1 class="brand-title">
                <span class="text-white">Fabio</span>&nbsp;<span class="text-black">Hot Stuff</span>&nbsp;<span class="text-white">Redaelli</span>
            </h1>
        </header>

        <div class="sub-nav">
            <div class="dropdown">
                <a class="dropdown-trigger">About Me</a>
                <ul class="dropdown-menu menu-about">
                    <li><a href="#about">Sono Fabio Redaelli,<br>appassionato di Rock’n’Roll e arte, ecc...</a></li>
                </ul>
            </div>

            <div class="dropdown">
                <a class="dropdown-trigger">Contact Me</a>
                <ul class="dropdown-menu menu-contact">
                    <li><a href="#instagram">Instagram</a></li>
                    <li><a href="#facebook">Facebook</a></li>
                    <li><a href="#telegram">Telegram</a></li>
                    <li><a href="#whatsapp">WhatsApp</a></li>
                </ul>
            </div>
        </div>

        <main></main>

        <footer>
            <p>Copyright 2026 Fabio Redaelli - Comic Art Author. Tutti i diritti riservati.</p>
        </footer>
    </div>

</body>
</html>
