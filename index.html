<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fabio Redaelli - Comic Art Author - Hot Stuff</title>
    <style>
        @font-face {
            font-family: 'Lobster Regular';
            src: url('fonts/lobsteregular.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0d1b2a;
        }

        /* LAYER 1 — Sfondo blurrato cover per riempire i lati su ogni monitor */
        .bg-blurred {
            position: absolute;
            inset: 0;
            background-image: url('images/background.jpg');
            background-size: cover;
            background-position: center;
            filter: blur(22px) brightness(0.55);
            transform: scale(1.08);
            z-index: 1;
        }

        /* LAYER 2 — L'opera d'arte nitida in modalità "contain" per non deformarsi mai */
        .bg-artwork {
            position: absolute;
            inset: 0;
            background-image: url('images/background.jpg');
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 2;
        }

        /* LAYER 3 — Contenuti e Interfaccia sopraelevata */
        .content-overlay {
            position: relative;
            z-index: 3;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            pointer-events: none;
        }

        /* Area Header riallineata alle proporzioni del tuo file originale */
        header {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            padding: 40px;
            pointer-events: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-spacer {
            flex: 1;
        }

        /* Contenitore invisibile per gestire la presenza del menu "Contact Me" senza spostare nulla */
        .nav-container {
            flex: 1;
            display: flex;
            justify-content: flex-end;
            align-items: center;
        }

        .dropdown {
            position: relative;
            display: inline-block;
        }

        /* "Contact Me" con il font Lobster posizionato a destra allineato */
        .dropdown-trigger {
            font-family: 'Lobster Regular', cursive;
            color: #ffffff;
            font-size: 1.85rem;
            text-decoration: none;
            cursor: pointer;
            padding: 10px 15px;
            transition: opacity 0.2s ease;
            white-space: nowrap;
            text-shadow: 1px 2px 4px rgba(0, 0, 0, 0.3);
        }

        .dropdown-trigger:hover {
            opacity: 0.85;
        }

        /* Tendina Dropdown Social */
        .dropdown-menu {
            display: none;
            position: absolute;
            right: 0;
            top: 100%;
            margin-top: 5px;
            background: rgba(13, 27, 42, 0.96);
            min-width: 180px;
            box-shadow: 0px 8px 24px rgba(0,0,0,0.35);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            list-style: none;
            padding: 6px 0;
            z-index: 100;
        }

        .dropdown-menu li a {
            color: #ffffff;
            padding: 12px 20px;
            text-decoration: none;
            display: block;
            font-size: 0.95rem;
            font-weight: 600;
            transition: background 0.2s ease;
        }

        .dropdown-menu li a:hover {
            background: #ff4757;
        }

        .dropdown:hover .dropdown-menu {
            display: block;
        }

        main {
            flex-grow: 1;
        }

        footer {
            padding: 15px;
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.8);
            pointer-events: auto;
        }
    </style>
</head>
<body>

    <div class="bg-blurred"></div>
    <div class="bg-artwork"></div>

    <div class="content-overlay">
        <header>
            <div class="header-spacer"></div>

            <nav class="nav-container">
                <div class="dropdown">
                    <a class="dropdown-trigger">Contact Me</a>
                    <ul class="dropdown-menu">
                        <li><a href="#instagram">Instagram</a></li>
                        <li><a href="#facebook">Facebook</a></li>
                        <li><a href="#telegram">Telegram</a></li>
                        <li><a href="#whatsapp">WhatsApp</a></li>
                    </ul>
                </div>
            </nav>
        </header>

        <main></main>

        <footer>
            <p>&copy; 2026 Fabio Redaelli - Comic Art Author. Tutti i diritti riservati.</p>
        </footer>
    </div>

</body>
</html>
