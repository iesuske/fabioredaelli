<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fabio Redaelli - Comic Art Author - Hot Stuff</title>
    <style>
        @font-face {
            font-family: 'Lobster Regular';
            src: url('fonts/lobsteregular.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fceecb;
        }

        /* LAYER 1 — Sfondo nitido a tutto schermo ancorato in alto */
        .bg-artwork {
            position: absolute;
            inset: 0;
            background-image: url('images/bg2.jpg');
            background-size: cover;
            background-position: top center;
            background-repeat: no-repeat;
            z-index: 1;
        }

        /* LAYER 2 — Interfaccia e testo sopra lo sfondo */
        .content-overlay {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            pointer-events: none;
        }

        /* Spinge l'intero blocco del testo sotto la banda rossa dell'immagine */
        header {
            width: 100%;
            /* Aumentato per posizionare il testo nella zona beige sotto la linea nera */
            margin-top: 14.5vw; 
            height: 7vw;
            padding: 0 4%;
            pointer-events: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Contenitore invisibile a sinistra per bilanciare il layout e tenere il titolo centrato */
        .header-spacer {
            flex: 1;
            display: flex;
        }

        /* Titolo centrale con font Lobster sotto la banda */
        .brand-title {
            font-family: 'Lobster Regular', cursive;
            font-size: 5vw; 
            letter-spacing: 1px;
            text-align: center;
            white-space: nowrap;
            line-height: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            flex: 2;
        }

        /* Modificati i colori per renderli leggibili sul beige dello sfondo */
        .text-dark {
            color: #1a1a1a; /* Grigio quasi nero molto elegante */
        }

        .text-black {
            color: #000000;
            margin: 0 2.2vw;
        }

        /* Area di navigazione posizionata a destra */
        .nav-container {
            flex: 1;
            display: flex;
            justify-content: flex-end;
            align-items: center;
        }

        /* Struttura del Menu Dropdown */
        .dropdown {
            position: relative;
            display: inline-block;
        }

        /* Pulsante principale "Contact Me" - Nero per lo sfondo chiaro */
        .dropdown-trigger {
            font-family: 'Lobster Regular', cursive;
            color: #1a1a1a;
            font-size: 2vw;
            text-decoration: none;
            cursor: pointer;
            padding: 10px 20px;
            transition: opacity 0.3s ease;
            white-space: nowrap;
        }

        .dropdown-trigger:hover {
            opacity: 0.7;
        }

        /* Il menu a tendina che scende */
        .dropdown-menu {
            display: none;
            position: absolute;
            right: 0;
            top: 100%;
            background: rgba(13, 27, 42, 0.95);
            min-width: 180px;
            box-shadow: 0px 8px 24px rgba(0,0,0,0.2);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            list-style: none;
            padding: 6px 0;
            z-index: 10;
        }

        .dropdown-menu li a {
            color: #ffffff;
            padding: 12px 20px;
            text-decoration: none;
            display: block;
            font-size: 0.95rem;
            font-weight: 600;
            transition: background 0.3s ease;
        }

        .dropdown-menu li a:hover {
            background: #ff4757; /* Richiamo rosso della banda sull'hover delle voci */
        }

        .dropdown:hover .dropdown-menu {
            display: block;
            animation: fadeInDropdown 0.3s ease;
        }

        @keyframes fadeInDropdown {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        main {
            flex-grow: 1;
            pointer-events: none;
        }

        footer {
            padding: 15px;
            text-align: center;
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.85rem;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.8);
            pointer-events: auto;
            background: rgba(13, 27, 42, 0.4);
            backdrop-filter: blur(4px);
            width: 100%;
        }

        /* Schermi Grandi desktop */
        @media (min-width: 1600px) {
            header {
                margin-top: 230px;
                height: 100px;
            }
            .brand-title {
                font-size: 5rem;
            }
            .dropdown-trigger {
                font-size: 2rem;
            }
        }

        /* Tablet e Mobile */
        @media (max-width: 768px) {
            header {
                margin-top: 15vw;
                height: 10vw;
            }
            .brand-title {
                font-size: 5.5vw; 
            }
            .dropdown-trigger {
                font-size: 2.5vw;
            }
        }
    </style>
</head>
<body>

    <div class="bg-artwork"></div>

    <div class="content-overlay">
        <header>
            <div class="header-spacer"></div>

            <h1 class="brand-title">
                <span class="text-dark">Fabio</span><span class="text-black">Hot Stuff</span><span class="text-dark">Redaelli</span>
            </h1>

            <nav class="nav-container">
                <div class="dropdown">
                    <a class="dropdown-trigger">Contact Me</a>
                    <ul class="dropdown-menu">
                        <li><a href="#instagram">Instagram</a></li>
                        <li><a href="#facebook">Facebook</a></li>
                        <li><a href="#telegram">Telegram</a></li>
                        <li><a href="#whatsapp">WhatsApp</a></li>
                    </ul>
                </div>
            </nav>
        </header>

        <main></main>

        <footer>
            <p>&copy; 2026 Fabio Redaelli - Comic Art Author. Tutti i diritti riservati.</p>
        </footer>
    </div>

</body>
</html>
