<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fabio Redaelli - Comic Art Author - Hot Stuff</title>
    <style>
        @font-face {
            font-family: 'Lobster Regular';
            src: url('fonts/lobsteregular.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fceecb; /* Colore di fallback identico allo sfondo del disegno */
        }

        /* LAYER 1 — Sfondo nitido impostato a tutto schermo */
        .bg-artwork {
            position: absolute;
            inset: 0;
            background-image: url('images/bg2.jpg');
            background-size: cover;
            background-position: top center;
            background-repeat: no-repeat;
            z-index: 1;
        }

        /* LAYER 2 — Interfaccia e testo sopra lo sfondo */
        .content-overlay {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            pointer-events: none;
        }

        /* L'header segue la proporzione esatta della banda rossa presente nell'immagine */
        header {
            width: 100%;
            /* Calcolo dinamico: mantiene il testo agganciato alla banda rossa durante il ridimensionamento */
            margin-top: 3.8vw; 
            height: 9.5vw;
            max-height: 150px;
            padding: 0 5%;
            pointer-events: auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Stile del Titolo: Bello largo, centrato e proporzionale alla finestra */
        .brand-title {
            font-family: 'Lobster Regular', cursive;
            font-size: 5.8vw; /* Il font scala insieme allo schermo per non sforare mai */
            max-size: 90px;
            letter-spacing: 1px;
            text-align: center;
            white-space: nowrap;
            line-height: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            width: 100%;
        }

        /* Classi per l'alternanza dei colori richiesti */
        .text-white {
            color: #ffffff;
        }

        .text-black {
            color: #000000;
            margin: 0 2.2vw; /* Spaziatura flessibile tra le parole */
        }

        main {
            flex-grow: 1;
            pointer-events: none;
        }

        footer {
            padding: 15px;
            text-align: center;
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.85rem;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.8);
            pointer-events: auto;
            background: rgba(13, 27, 42, 0.4);
            backdrop-filter: blur(4px);
            width: 100%;
        }

        /* Ottimizzazione specifica per schermi molto grandi (Desktop Monitor HD e superiori) */
        @media (min-width: 1600px) {
            header {
                margin-top: 60px;
                height: 130px;
            }
            .brand-title {
                font-size: 5.5rem;
            }
            .text-black {
                margin: 0 30px;
            }
        }

        /* Ottimizzazione per Tablet e Smartphone per garantire la perfetta leggibilità dentro la fascia */
        @media (max-width: 768px) {
            header {
                margin-top: 4vw;
                height: 11vw;
            }
            .brand-title {
                font-size: 6.5vw; 
            }
            .text-black {
                margin: 0 2vw;
            }
            footer {
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>

    <div class="bg-artwork"></div>

    <div class="content-overlay">
        <header>
            <h1 class="brand-title">
                <span class="text-white">Fabio</span><span class="text-black">Hot Stuff</span><span class="text-white">Redaelli</span>
            </h1>
        </header>

        <main></main>

        <footer>
            <p>&copy; 2026 Fabio Redaelli - Comic Art Author. Tutti i diritti riservati.</p>
        </footer>
    </div>

</body>
</html>
