<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fabio Redaelli - Comic Art Author - Hot Stuff</title>
    <style>
        /* Definizione del font personalizzato Lobster */
        @font-face {
            font-family: 'Lobster Regular';
            src: url('fonts/lobsteregular.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        /* Reset dei margini e gestione della pagina */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden; /* Blocca lo scroll */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0d1b2a;
        }

        /* 1. SFONDO SFOCATO "AMBIENTALE" */
        .bg-blurred-ambient {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('images/sfondo2.jpg');
            background-size: cover;
            background-position: center;
            filter: blur(15px) brightness(0.6);
            transform: scale(1.1);
            z-index: 1;
        }

        /* 2. OPERA D'ARTE CENTRALE - Questa è la chiave del posizionamento */
        .bg-main-artwork {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('images/sfondo2.jpg');
            background-size: contain;     /* Mostra l'auto intera */
            background-position: center;   /* Centra il poster nel monitor */
            background-repeat: no-repeat;
            filter: drop-shadow(0px 0px 30px rgba(0, 0, 0, 0.65));
            z-index: 2;
        }

        /* Navigazione: posizionata IN MODO ASSOLUTO rispetto all'artwork nitido centrale */
        /* Questo assicura che il menu segua l'immagine centrale quando questa si ridimensiona */
        .top-nav {
            position: absolute;
            /* Coordinate percentuali basate sul frame dell'artwork centrale */
            top: 15.5%; /* Calcolato per combaciare perfettamente con l'altezza della banda rossa su desktop */
            right: 17%; /* Distanza dal bordo destro dell'area centrale */
            
            display: flex;
            gap: 40px; /* Spazio tra "About Me" e "Contact" */
            pointer-events: auto; /* Riattiva i clic per i link */
        }

        /* Stile dei link del Menu con il font Lobster e l'ombra corretta */
        .nav-link {
            font-family: 'Lobster Regular', cursive;
            font-size: 2.2rem;
            color: #ffffff;
            text-decoration: none;
            transition: transform 0.2s ease, color 0.2s ease, text-shadow 0.2s ease;
            
            /* Applichiamo un'ombra morbida ma decisa per staccare dal rosso, 
               simile a quella nel tuo screenshot */
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.7); 
        }

        /* Effetto al passaggio del mouse (Hover) */
        .nav-link:hover {
            color: #fbc02d; /* Giallo caldo "Hot Stuff" */
            transform: scale(1.05); /* Piccolo ingrandimento fluido */
            text-shadow: 0px 0px 8px rgba(251, 192, 45, 0.6); /* Bagliore coordinato */
        }

        /* Footer coordinato */
        footer {
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 15px;
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.8);
            pointer-events: auto;
            z-index: 3; /* Sopra a tutto il comparto grafico */
        }
    </style>
</head>
<body>

    <div class="bg-blurred-ambient"></div>

    <div class="bg-main-artwork">
        <nav class="top-nav">
            <a href="#about" class="nav-link">About Me</a>
            <a href="#contact" class="nav-link">Contact</a>
        </nav>
    </div>

    <footer>
        <p>&copy; 2026 Fabio Redaelli - Comic Art Author. Tutti i diritti riservati.</p>
    </footer>

</body>
</html>
