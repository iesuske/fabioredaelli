<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fabio Redaelli - Comic Art Author - Hot Stuff</title>
    <style>
        /* Definizione del font personalizzato Lobster */
        @font-face {
            font-family: 'Lobster Regular';
            src: url('fonts/lobsteregular.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        /* Reset dei margini e gestione della pagina */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden; /* Blocca lo scroll */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #63bdd2; /* Colore di sicurezza */
        }

        /* SFONDO PANORAMICO ESTESO (Ora riempie il monitor al 100% senza tagli o bande) */
        .bg-main-artwork {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('images/sfondo2.jpg');
            background-size: cover;          /* Copre interamente lo schermo del PC */
            background-position: top center; /* Tiene la banda rossa attaccata al soffitto */
            background-repeat: no-repeat;
            z-index: 1;
        }

        /* Area del Menu agganciata in modo preciso sopra la banda rossa */
        .top-nav {
            position: absolute;
            top: 4.5vh;    /* Altezza ideale per posizionarsi dentro la banda rossa su desktop */
            right: 40px;   /* Distanza dal bordo destro dello schermo */
            display: flex;
            gap: 40px;     /* Spazio tra i due pulsanti */
            z-index: 2;
            pointer-events: auto;
        }

        /* Stile dei pulsanti del Menu */
        .nav-link {
            font-family: 'Lobster Regular', cursive;
            font-size: 2.2rem;
            color: #ffffff;
            text-decoration: none;
            transition: transform 0.2s ease, color 0.2s ease;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.5); 
        }

        .nav-link:hover {
            color: #fbc02d; /* Giallo Hot Stuff */
            transform: scale(1.05); 
        }

        /* Footer */
        footer {
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 15px;
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.6);
            z-index: 2;
        }
    </style>
</head>
<body>

    <div class="bg-main-artwork"></div>

    <nav class="top-nav">
        <a href="#about" class="nav-link">About Me</a>
        <a href="#contact" class="nav-link">Contact</a>
    </nav>

    <footer>
        <p>&copy; 2026 Fabio Redaelli - Comic Art Author. Tutti i diritti riservati.</p>
    </footer>

</body>
</html>
