<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fabio Redaelli - Comic Art Author - Hot Stuff</title>
    <style>
        /* Definizione del font personalizzato Lobster */
        @font-face {
            font-family: 'Lobster Regular';
            src: url('fonts/lobsteregular.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        /* Reset dei margini */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden; /* Evita lo scroll per mantenere il layout fisso */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #b71c1c; /* Fallback rosso che richiama la banda superiore */
        }

        /* Container dello sfondo ottimizzato per Desktop */
        .bg-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('images/sfondo2.jpg');
            /* background-size: 100% auto; forza l'immagine a occupare tutta la larghezza 
               dello schermo e ad adattare l'altezza in modo proporzionale senza deformarsi */
            background-size: 100% auto;
            background-position: top center; /* Mantiene la banda rossa e il nome perfettamente agganciati in alto */
            background-repeat: no-repeat;
            z-index: 1;
        }

        /* Overlay per i contenuti */
        .content-overlay {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            pointer-events: none;
        }

        header {
            padding: 40px;
            pointer-events: auto;
        }

        main {
            flex-grow: 1;
        }

        footer {
            padding: 20px;
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.6);
            pointer-events: auto;
        }
    </style>
</head>
<body>

    <div class="bg-container"></div>

    <div class="content-overlay">
        <header>
            </header>

        <main>
            </main>

        <footer>
            <p>&copy; 2026 Fabio Redaelli - Comic Art Author. Tutti i diritti riservati.</p>
        </footer>
    </div>

</body>
</html>
