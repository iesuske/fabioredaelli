<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fabio Redaelli - Comic Art Author - Hot Stuff</title>
    <style>
        @font-face {
            font-family: 'Lobster Regular';
            src: url('fonts/lobsteregular.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow-x: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fceecb;
        }

        /* LAYER 1 — Sfondo */
        .bg-artwork {
            position: absolute;
            inset: 0;
            background-image: url('images/bg2.jpg');
            background-size: cover;
            background-position: center 18%; 
            background-repeat: no-repeat;
            z-index: 1;
        }

        /* LAYER 2 — Contenuti */
        .content-overlay {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            pointer-events: none;
        }

        header {
            width: 100%;
            margin-top: 45px; 
            padding: 0 4%;
            pointer-events: auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Titolo principale */
        .brand-title {
            font-family: 'Lobster Regular', cursive;
            font-size: 5.5rem; 
            letter-spacing: 1px;
            text-align: center;
            white-space: nowrap;
            line-height: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            text-shadow: 1px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .text-white {
            color: #ffffff;
        }

        .text-black {
            color: #000000;
        }

        /* Sezione sottomenu posizionata sotto la banda dell'header */
        .sub-nav {
            width: 100%;
            padding: 0 4%;
            display: flex;
            justify-content: flex-end; 
            gap: 20px; 
            pointer-events: auto;
            margin-top: 25px; 
        }

        .dropdown {
            position: relative;
            display: inline-block;
        }

        /* Voci principali dei Menu */
        .dropdown-trigger {
            font-family: 'Lobster Regular', cursive;
            color: #ffffff; 
            font-size: 1.8rem;
            text-decoration: none;
            cursor: pointer;
            padding: 10px 15px;
            transition: color 0.2s ease;
            white-space: nowrap;
            text-shadow: 1px 2px 4px rgba(0, 0, 0, 0.4);
        }

        /* Cambia colore in rosso al passaggio del mouse */
        .dropdown:hover .dropdown-trigger {
            color: #b72216;
        }

        /* Menu a tendina Anni '50 simmetrico */
        .dropdown-menu {
            display: none;
            position: absolute;
            right: 50%;
            transform: translateX(50%); 
            top: 100%;
            margin-top: 12px;
            background: #000000; 
            
            width: auto;
            min-width: 180px; 
            
            box-shadow: 0px 12px 32px rgba(0,0,0,0.55);
            border-radius: 45px / 55px;
            border: 1px solid rgba(255, 255, 255, 0.12);
            list-style: none;
            padding: 0 0; 
            z-index: 10;
            overflow: hidden; 
        }

        .dropdown-menu li {
            margin: 0; 
            width: 100%;
            display: block;
        }

        .dropdown-menu li a {
            font-family: 'Lobster Regular', cursive;
            color: #ffffff; 
            padding: 10px 24px; 
            text-decoration: none;
            display: block;
            width: 100%;
            font-size: 1.4rem; 
            text-align: center; 
            letter-spacing: 0.8px;
            line-height: 1.3; 
            transition: background-color 0.15s ease;
        }

        .dropdown-menu li:first-child a {
            padding-top: 24px;
        }

        .dropdown-menu li:last-child a {
            padding-bottom: 24px;
        }

        .dropdown-menu li a:hover {
            background: #b72216; 
            color: #ffffff;
        }

        /* L'effetto hover apre il menu */
        .dropdown:hover .dropdown-menu {
            display: block;
            animation: fadeInDropdown 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes fadeInDropdown {
            from { opacity: 0; transform: translate(50%, 12px); }
            to { opacity: 1; transform: translate(50%, 0); }
        }

        main {
            flex-grow: 1;
            pointer-events: none;
        }

        footer {
            padding: 15px;
            text-align: center;
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.85rem;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.8);
            pointer-events: auto;
            background: rgba(13, 27, 42, 0.4);
            backdrop-filter: blur(4px);
            width: 100%;
        }

        /* --- MEDIA QUERY PER SCHERMI GRANDI / MEDI --- */
        @media (max-width: 1200px) {
            header { margin-top: 40px; }
            .brand-title { font-size: 4.2rem; }
            .bg-artwork { background-position: center 16%; }
        }

        @media (max-width: 900px) {
            header { margin-top: 30px; }
            .brand-title { font-size: 3rem; }
            .sub-nav { margin-top: 15px; gap: 15px; }
            .dropdown-trigger { font-size: 1.4rem; }
            .dropdown-menu { min-width: 150px; border-radius: 35px / 45px; }
            .dropdown-menu li a { font-size: 1.2rem; padding: 10px 18px; }
            .dropdown-menu li:first-child a { padding-top: 20px; }
            .dropdown-menu li:last-child a { padding-bottom: 20px; }
            .bg-artwork { background-position: center 14%; }
        }

        /* RISOLUZIONE COMPLETA PER IPHONE / MOBILE */
        @media (max-width: 768px) {
            header { 
                margin-top: 15px; 
                padding: 0 10px;
            }

            .brand-title { 
                font-size: 1.9rem; 
                white-space: nowrap;
                width: 100%;
                justify-content: center;
            }

            .sub-nav {
                justify-content: center; 
                margin-top: 35px; 
                gap: 15px; 
            }

            .dropdown-trigger { 
                font-size: 1.3rem; 
                padding: 6px 12px;
                text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.5); 
            }

            .dropdown-menu { 
                min-width: 160px; 
                border-radius: 30px / 40px; 
                position: absolute;
                left: 50%;
                transform: translateX(-50%); 
                right: auto;
            }

            .dropdown:hover .dropdown-menu {
                transform: translate(-50%, 0);
            }

            .dropdown-menu li a { 
                padding: 10px 18px; 
                font-size: 1.1rem; 
            }
            .dropdown-menu li:first-child a { padding-top: 18px; }
            .dropdown-menu li:last-child a { padding-bottom: 18px; }

            .bg-artwork { 
                background-position: center center; 
            }

            footer {
                font-size: 0.8rem;
                padding: 12px 10px;
            }
        }
    </style>
</head>
<body>

    <div class="bg-artwork"></div>

    <div class="content-overlay">
        <header>
            <h1 class="brand-title">
                <span class="text-white">Fabio</span>&nbsp;<span class="text-black">Hot Stuff</span>&nbsp;<span class="text-white">Redaelli</span>
            </h1>
        </header>

        <div class="sub-nav">
            <!-- MENU: About Me — TESTO CORRETTO E MANDATO A CAPO DOPO REDAELLI, -->
            <div class="dropdown">
                <a class="dropdown-trigger">About Me</a>
                <ul class="dropdown-menu">
                    <li><a href="#about">Sono Fabio Redaelli,<br>ho frequentato…</a></li>
                </ul>
            </div>

            <!-- MENU: Contact Me -->
            <div class="dropdown">
                <a class="dropdown-trigger">Contact Me</a>
                <ul class="dropdown-menu">
                    <li><a href="#instagram">Instagram</a></li>
                    <li><a href="#facebook">Facebook</a></li>
                    <li><a href="#telegram">Telegram</a></li>
                    <li><a href="#whatsapp">WhatsApp</a></li>
                </ul>
            </div>
        </div>

        <main></main>

        <footer>
            <p>&copy; 2026 Fabio Redaelli - Comic Art Author. Tutti i diritti riservati.</p>
        </footer>
    </div>

</body>
</html>
