<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fabio Hot Stuff Redaelli</title>
    
    <style>
        /* Reset iniziale dei margini del browser */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* Registriamo il font che hai caricato su GitHub */
        @font-face {
            font-family: 'GutteryFont';
            src: url('fonts/guttery.otf');
            font-weight: normal;
            font-style: normal;
        }

        /* --- 1. STILE DI BASE (DESKTOP) --- */
        body {
            background-color: #000000;
            color: #ffffff;
            height: 100vh;
            display: flex;
            justify-content: flex-start; /* Allinea a sinistra */
            align-items: flex-start;     /* Allinea in alto */
            padding-top: 60px;           /* Distanza dall'alto su PC */
            padding-left: 40px;          /* MARGINE UNIFICATO DA SINISTRA */
            padding-right: 40px;
            overflow: hidden;
        }

        .brand-name {
            font-family: 'GutteryFont', sans-serif;
            font-size: 2.8vw;            /* Dimensione per monitor PC */
            text-transform: uppercase;
            letter-spacing: -1px;
            text-align: left;
            white-space: nowrap;         /* Tutto su una riga */
        }

        .highlight {
            color: #ff3333;              /* Rosso acceso */
        }

        /* --- 2. REGOLE SPECIFICHE PER IPAD E TABLET --- */
        @media screen and (min-width: 481px) and (max-width: 1024px) {
            body {
                padding-top: 50px;       /* Distanza dall'alto su iPad */
                padding-left: 40px;      /* STESSO MARGINE DA SINISTRA */
                padding-right: 40px;
            }

            .brand-name {
                font-size: 4.5vw;        /* Font ingrandito per renderlo proporzionato su iPad */
                letter-spacing: -0.8px;
            }
        }

        /* --- 3. REGOLE SPECIFICHE PER IPHONE E SMARTPHONE --- */
        @media screen and (max-width: 480px) {
            body {
                padding-top: 40px;       /* Distanza dall'alto su iPhone */
                padding-left: 40px;      /* STESSO MARGINE DA SINISTRA ANCHE SU MOBILE */
                padding-right: 40px;
            }

            .brand-name {
                font-size: 5.8vw;        /* Font grande d'impatto per il telefono */
                letter-spacing: -0.5px;  
            }
        }
    </style>
</head>
<body>

    <h1 class="brand-name">
        Fabio <span class="highlight">Hot Stuff</span> Redaelli
    </h1>

</body>
</html>
