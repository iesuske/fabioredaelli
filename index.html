<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fabio Hot Stuff Redaelli</title>
    
    <style>
        /* Reset iniziale dei margini del browser */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* Registriamo il font che hai caricato su GitHub */
        @font-face {
            font-family: 'GutteryFont';
            src: url('fonts/guttery.otf');
            font-weight: normal;
            font-style: normal;
        }

        /* --- 1. STILE DI BASE (DESKTOP) --- */
        body {
            background-color: #000000;
            color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;    /* Incolonna gli elementi (titolo e sottotitolo) */
            justify-content: center;   /* Centra verticalmente */
            align-items: center;       /* Centra orizzontalmente */
            padding-left: 40px;          
            padding-right: 40px;
            overflow: hidden;
        }

        .brand-name {
            font-family: 'GutteryFont', sans-serif;
            font-size: 2.8vw;            /* Dimensione per monitor PC */
            font-weight: normal;         /* Toglie il grassetto automatico */
            letter-spacing: -1px;        /* Lettere vicine all'interno della parola */
            word-spacing: 6px;           /* Spaziatura tra le parole */
            text-align: center;          /* Forza il testo al centro */
            white-space: nowrap;         /* Tutto su una riga */
            margin-bottom: 15px;         /* Spazio tra il nome e il sottotitolo */
        }

        .highlight {
            color: #ff3333;              /* Rosso acceso */
        }

        /* Stile per il sottotitolo */
        .subtitle {
            font-family: sans-serif;     /* Font lineare pulito per il sottotitolo, puoi cambiarlo se serve */
            font-size: 1.2vw;            /* Dimensione proporzionale su PC */
            text-transform: lowercase;   /* Tutto minuscolo */
            letter-spacing: 2px;         /* Un po' di aria tra le lettere */
            color: #cccccc;              /* Grigio chiaro per non appesantire */
            text-align: center;
        }

        /* --- 2. REGOLE SPECIFICHE PER IPAD E TABLET --- */
        @media screen and (min-width: 481px) and (max-width: 1024px) {
            .brand-name {
                font-size: 4.5vw;        
                letter-spacing: -0.8px;
                word-spacing: 8px;       
            }
            .subtitle {
                font-size: 2vw;
            }
        }

        /* --- 3. REGOLE SPECIFICHE PER IPHONE E SMARTPHONE --- */
        @media screen and (max-width: 480px) {
            .brand-name {
                font-size: 5.8vw;        
                letter-spacing: -0.5px;  
                word-spacing: 5px;       
            }
            .subtitle {
                font-size: 3vw;
            }
        }
    </style>
</head>
<body>

    <h1 class="brand-name">
        Fabio <span class="highlight">“Hot Stuff”</span> Redaelli
    </h1>
    
    <div class="subtitle">
        - comics and illustrations -
    </div>

</body>
</html>
