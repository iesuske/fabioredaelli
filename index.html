<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fabio Redaelli - Comic Art Author - Hot Stuff</title>
    <style>
        @font-face {
            font-family: 'Lobster Regular';
            src: url('fonts/lobsteregular.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fceecb;
        }

        /* LAYER 1 — Sfondo nitido ancorato in alto (Cover) */
        .bg-artwork {
            position: absolute;
            inset: 0;
            background-image: url('images/bg2.jpg');
            background-size: cover;
            background-position: top center;
            background-repeat: no-repeat;
            z-index: 1;
        }

        /* LAYER 2 — Interfaccia utente e Contenuti */
        .content-overlay {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            pointer-events: none;
        }

        header {
            padding: 30px 20px;
            pointer-events: auto;
            display: flex;
            justify-content: center; /* Centra perfettamente la scritta nella pagina */
            align-items: center;
            width: 100%;
        }

        /* Stile per il titolo centrato e largo con font Lobster */
        .brand-title {
            font-family: 'Lobster Regular', cursive;
            font-size: 3.5rem; /* Dimensione bella larga */
            letter-spacing: 1px;
            text-align: center;
            line-height: 1.2;
            white-space: nowrap;
            /* Ombra leggera opzionale per staccare dal fondo se necessario */
            text-shadow: 1px 1px 3px rgba(0, 0, 0, 0.15); 
        }

        /* Alternanza dei colori richiesti */
        .text-white {
            color: #ffffff;
        }

        .text-black {
            color: #000000;
            margin: 0 12px; /* Spaziatura attorno a Hot Stuff */
        }

        main {
            flex-grow: 1;
            pointer-events: none;
        }

        footer {
            padding: 15px;
            text-align: center;
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.85rem;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.8);
            pointer-events: auto;
            background: rgba(13, 27, 42, 0.4);
            backdrop-filter: blur(4px);
            width: 100%;
        }

        /* Responsive design per schermi piccoli per non fare uscire la scritta dal frame */
        @media (max-width: 768px) {
            header {
                padding: 20px 10px;
            }
            .brand-title {
                font-size: 2.2rem; /* Si rimpicciolisce sui dispositivi mobili per rimanere dentro la banda */
            }
            .text-black {
                margin: 0 6px;
            }
            footer {
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>

    <div class="bg-artwork"></div>

    <div class="content-overlay">
        <header>
            <h1 class="brand-title">
                <span class="text-white">Fabio</span><span class="text-black">Hot Stuff</span><span class="text-white">Redaelli</span>
            </h1>
        </header>

        <main></main>

        <footer>
            <p>&copy; 2026 Fabio Redaelli - Comic Art Author. Tutti i diritti riservati.</p>
        </footer>
    </div>

</body>
</html>
