<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fabio Redaelli - Comic Art Author - Hot Stuff</title>
    <style>
        @font-face {
            font-family: 'Lobster Regular';
            src: url('fonts/lobsteregular.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fceecb;
        }

        /* LAYER 1 — Lo sfondo pulito a tutto schermo */
        .bg-artwork {
            position: absolute;
            inset: 0;
            background-image: url('images/bg2.jpg');
            background-size: cover;
            background-position: center 18%; 
            background-repeat: no-repeat;
            z-index: 1;
        }

        /* LAYER 2 — Contenuti sopra lo sfondo */
        .content-overlay {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            pointer-events: none;
        }

        header {
            width: 100%;
            margin-top: 45px; 
            height: 110px;
            padding: 0 4%;
            pointer-events: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        .header-spacer {
            flex: 1;
        }

        /* Titolo principale */
        .brand-title {
            font-family: 'Lobster Regular', cursive;
            font-size: 5.5rem; 
            letter-spacing: 1px;
            text-align: center;
            white-space: nowrap;
            line-height: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            flex: 3;
            text-shadow: 1px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .text-white {
            color: #ffffff;
        }

        .text-black {
            color: #000000;
        }

        /* Navigazione Contact Me sulla destra */
        .nav-container {
            flex: 1;
            display: flex;
            justify-content: flex-end;
            align-items: center;
        }

        .dropdown {
            position: relative;
            display: inline-block;
        }

        /* Voce principale "Contact Me" */
        .dropdown-trigger {
            font-family: 'Lobster Regular', cursive;
            color: #ffffff;
            font-size: 1.8rem;
            text-decoration: none;
            cursor: pointer;
            padding: 10px 15px;
            transition: opacity 0.2s ease;
            white-space: nowrap;
            text-shadow: 1px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .dropdown-trigger:hover {
            opacity: 0.85;
        }

        /* Menu a tendina con forma Anni '50 (Mid-century blob) */
        .dropdown-menu {
            display: none;
            position: absolute;
            right: 50%;
            transform: translateX(50%); 
            top: 100%;
            margin-top: 12px;
            background: #000000; 
            
            width: auto;
            min-width: 220px; 
            
            box-shadow: 0px 12px 32px rgba(0,0,0,0.55);
            
            /* Forma asimmetrica organica stile anni '50 */
            border-radius: 50px 35px 55px 40px / 45px 55px 40px 50px;
            
            border: 1px solid rgba(255, 255, 255, 0.12);
            list-style: none;
            padding: 30px 0; /* Rimosso il padding laterale per permettere all'hover di toccare i bordi */
            z-index: 10;
            overflow: hidden; /* Taglia lo sfondo rosso dell'hover per farlo seguire alla forma curva della TV */
        }

        /* Struttura delle righe interne */
        .dropdown-menu li {
            margin: 2px 0;
            width: 100%;
            display: block;
        }

        /* MODIFICATO: Voci di menu a tutta larghezza per riempire i lati destro e sinistro */
        .dropdown-menu li a {
            font-family: 'Lobster Regular', cursive;
            color: #ffffff; 
            padding: 10px 35px; /* Spostato il respiro e lo spazio all'interno del link stesso */
            text-decoration: none;
            display: block;
            width: 100%;
            font-size: 1.4rem; 
            text-align: center; 
            letter-spacing: 0.8px;
            transition: background-color 0.15s ease;
        }

        /* MODIFICATO: L'hover ora si estende completamente eliminando il bordo nero laterale */
        .dropdown-menu li a:hover {
            background: #b72216; /* Lo stesso rosso della riga */
            color: #ffffff;
        }

        .dropdown:hover .dropdown-menu {
            display: block;
            animation: fadeInDropdown 0.25s cubic-bezier(0.175, 0.885, 0.32, 1.275);
        }

        @keyframes fadeInDropdown {
            from { opacity: 0; transform: translate(50%, 12px); }
            to { opacity: 1; transform: translate(50%, 0); }
        }

        main {
            flex-grow: 1;
            pointer-events: none;
        }

        footer {
            padding: 15px;
            text-align: center;
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.85rem;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.8);
            pointer-events: auto;
            background: rgba(13, 27, 42, 0.4);
            backdrop-filter: blur(4px);
            width: 100%;
        }

        /* Controllo responsive */
        @media (max-width: 1200px) {
            header { margin-top: 40px; height: 90px; }
            .brand-title { font-size: 4.2rem; }
            .bg-artwork { background-position: center 16%; }
        }

        @media (max-width: 900px) {
            header { margin-top: 30px; height: 75px; }
            .brand-title { font-size: 3rem; }
            .dropdown-trigger { font-size: 1.4rem; }
            .dropdown-menu { padding: 25px 0; min-width: 180px; border-radius: 40px 30px 45px 35px; }
            .dropdown-menu li a { font-size: 1.2rem; padding: 8px 25px; }
            .bg-artwork { background-position: center 14%; }
        }

        @media (max-width: 768px) {
            header { margin-top: 25px; height: 60px; padding: 0 2%; }
            .brand-title { font-size: 2.2rem; }
            .dropdown-trigger { font-size: 1.1rem; }
            .dropdown-menu { padding: 20px 0; min-width: 150px; border-radius: 30px 25px 35px 28px; }
            .dropdown-menu li a { padding: 6px 20px; font-size: 1rem; }
            .bg-artwork { background-position: center center; }
        }
    </style>
</head>
<body>

    <div class="bg-artwork"></div>

    <div class="content-overlay">
        <header>
            <div class="header-spacer"></div>

            <h1 class="brand-title">
                <span class="text-white">Fabio</span> <span class="text-black">Hot Stuff</span> <span class="text-white">Redaelli</span>
            </h1>

            <nav class="nav-container">
                <div class="dropdown">
                    <a class="dropdown-trigger">Contact Me</a>
                    <ul class="dropdown-menu">
                        <li><a href="#instagram">Instagram</a></li>
                        <li><a href="#facebook">Facebook</a></li>
                        <li><a href="#telegram">Telegram</a></li>
                        <li><a href="#whatsapp">WhatsApp</a></li>
                    </ul>
                </div>
            </nav>
        </header>

        <main></main>

        <footer>
            <p>&copy; 2026 Fabio Redaelli - Comic Art Author. Tutti i diritti riservati.</p>
        </footer>
    </div>

</body>
</html>
