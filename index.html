<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fabio Redaelli - Comic Art Author - Hot Stuff</title>
    <style>
        @font-face {
            font-family: 'Lobster Regular';
            src: url('fonts/lobsteregular.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fceecb;
        }

        /* LAYER 1 — Sfondo nitido. Spostato ulteriormente verso l'alto (-55px) per avvicinare la macchina alla banda */
        .bg-artwork {
            position: absolute;
            inset: 0;
            background-image: url('images/bg2.jpg');
            background-size: cover;
            background-position: center -55px; 
            background-repeat: no-repeat;
            z-index: 1;
        }

        /* LAYER 2 — Interfaccia utente sopra lo sfondo */
        .content-overlay {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            pointer-events: none;
        }

        /* Allineamento dentro la banda rossa */
        header {
            width: 100%;
            margin-top: 3.8vw; 
            height: 8.5vw;
            max-height: 130px;
            padding: 0 4%;
            pointer-events: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Bilanciamento per mantenere il titolo perfettamente centrato */
        .header-spacer {
            flex: 1;
        }

        /* Titolo centrato che fluttua nella fascia senza toccare i bordi neri */
        .brand-title {
            font-family: 'Lobster Regular', cursive;
            font-size: 5.5vw; 
            max-size: 85px;
            letter-spacing: 1px;
            text-align: center;
            white-space: nowrap;
            line-height: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            flex: 3;
            text-shadow: 1px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .text-white {
            color: #ffffff;
        }

        .text-black {
            color: #000000;
        }

        /* Spazio singolo naturale intorno alla scritta nera centrale */
        .spacer-word {
            display: inline-block;
            width: 0.28em; 
        }

        /* Navigazione del menu a destra */
        .nav-container {
            flex: 1;
            display: flex;
            justify-content: flex-end;
            align-items: center;
        }

        .dropdown {
            position: relative;
            display: inline-block;
        }

        /* Scritta elegante "Contact Me" in bianco */
        .dropdown-trigger {
            font-family: 'Lobster Regular', cursive;
            color: #ffffff;
            font-size: 2.2vw;
            max-size: 34px;
            text-decoration: none;
            cursor: pointer;
            padding: 10px 15px;
            transition: opacity 0.2s ease;
            white-space: nowrap;
            text-shadow: 1px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .dropdown-trigger:hover {
            opacity: 0.85;
        }

        /* Menu a tendina */
        .dropdown-menu {
            display: none;
            position: absolute;
            right: 0;
            top: 100%;
            margin-top: 5px;
            background: rgba(13, 27, 42, 0.96);
            min-width: 180px;
            box-shadow: 0px 8px 24px rgba(0,0,0,0.35);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            list-style: none;
            padding: 6px 0;
            z-index: 10;
        }

        .dropdown-menu li a {
            color: #ffffff;
            padding: 12px 20px;
            text-decoration: none;
            display: block;
            font-size: 0.95rem;
            font-weight: 600;
            transition: background 0.2s ease;
        }

        .dropdown-menu li a:hover {
            background: #ff4757;
        }

        .dropdown:hover .dropdown-menu {
            display: block;
            animation: fadeInDropdown 0.2s ease;
        }

        @keyframes fadeInDropdown {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        main {
            flex-grow: 1;
            pointer-events: none;
        }

        footer {
            padding: 15px;
            text-align: center;
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.85rem;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.8);
            pointer-events: auto;
            background: rgba(13, 27, 42, 0.4);
            backdrop-filter: blur(4px);
            width: 100%;
        }

        /* Scalabilità Monitor Grandi */
        @media (min-width: 1600px) {
            header {
                margin-top: 60px;
                height: 120px;
            }
            .brand-title { font-size: 5.5rem; }
            .dropdown-trigger { font-size: 2.2rem; }
        }

        /* Scalabilità Tablet e Desktop standard */
        @media (max-width: 1024px) {
            header { margin-top: 3.8vw; height: 9.5vw; }
            .brand-title { font-size: 4.8vw; }
            .dropdown-trigger { font-size: 2.2vw; }
            .bg-artwork { background-position: center -35px; }
        }

        @media (max-width: 768px) {
            header { margin-top: 4vw; height: 11vw; padding: 0 2%; }
            .brand-title { font-size: 5.2vw; }
            .dropdown-trigger { font-size: 2.6vw; }
            .dropdown-menu { min-width: 140px; }
            .dropdown-menu li a { padding: 10px 15px; font-size: 0.85rem; }
            .bg-artwork { background-position: center 0px; }
        }
    </style>
</head>
<body>

    <div class="bg-artwork"></div>

    <div class="content-overlay">
        <header>
            <div class="header-spacer"></div>

            <h1 class="brand-title">
                <span class="text-white">Fabio</span><span class="spacer-word"></span><span class="text-black">Hot Stuff</span><span class="spacer-word"></span><span class="text-white">Redaelli</span>
            </h1>

            <nav class="nav-container">
                <div class="dropdown">
                    <a class="dropdown-trigger">Contact Me</a>
                    <ul class="dropdown-menu">
                        <li><a href="#instagram">Instagram</a></li>
                        <li><a href="#facebook">Facebook</a></li>
                        <li><a href="#telegram">Telegram</a></li>
                        <li><a href="#whatsapp">WhatsApp</a></li>
                    </ul>
                </div>
            </nav>
        </header>

        <main></main>

        <footer>
            <p>&copy; 2026 Fabio Redaelli - Comic Art Author. Tutti i diritti riservati.</p>
        </footer>
    </div>

</body>
</html>
