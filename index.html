<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">

    <style>
        /* Reset iniziale dei margini del browser */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* Registriamo il font caricato sul server */
        @font-face {
            font-family: 'GutteryFont';
            src: url('fonts/guttery.otf');
            font-weight: normal;
            font-style: normal;
        }

        /* --- 1. STILE DI BASE (DESKTOP) --- */
        body {
            background-color: #000000;
            color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;       /* Centra orizzontalmente tutto il contenuto della pagina */
            justify-content: flex-start; /* Fa partire il contenuto dall'alto */
            overflow: hidden;
        }

        /* L'intestazione principale (Titolo della Home) */
        header {
            position: relative;        /* Necessario per posizionare la striscia dietro al testo */
            display: flex;
            flex-direction: column;    /* Incolonna il nome e il sottotitolo */
            align-items: center;       /* Centra perfettamente gli elementi tra di loro */
            justify-content: center;   /* Centra il testo verticalmente rispetto alla banda */
            text-align: center;
            padding-top: 60px;         /* Distanza dal bordo superiore dello schermo */
            padding-bottom: 60px;
            width: 100%;
            min-height: 240px;         /* Altezza per contenere comodamente la striscia grafica */
        }

        /* --- STILE MENU CONTACT ME IN ALTO A DESTRA --- */
        .nav-container {
            position: absolute;
            top: 12px;                 
            right: 40px;
            z-index: 10;               /* Molto alto per stare sopra a tutto, anche alla striscia */
        }

        .dropdown {
            position: relative;
            display: inline-block;
        }

        /* Pulsante/Scritta principale "Cont@ct Me" */
        .dropdown-trigger {
            font-family: 'GutteryFont', sans-serif;
            color: #ff3333;            /* Colore Magenta/Rosso abbinato a Hot Stuff */
            font-size: 1.8rem;         
            text-decoration: none;
            cursor: pointer;
            letter-spacing: 1px;
            text-shadow: 0px 0px 10px rgba(0, 0, 0, 0.9);
            transition: color 0.3s ease, transform 0.3s ease;
            display: block;
            padding: 10px;
        }

        .dropdown-trigger:hover {
            color: #ffffff;            
            transform: scale(1.05);    
        }

        /* Contenitore delle voci del menu (la tendina) */
        .dropdown-menu {
            position: absolute;
            top: 90%;                  
            right: 0;
            background-color: rgba(15, 15, 15, 0.95); 
            border: 1px solid rgba(255, 51, 51, 0.4);  
            border-radius: 6px;
            list-style: none;
            min-width: 200px;          
            box-shadow: 0px 8px 16px rgba(0, 0, 0, 0.6);
            
            /* Stati per l'animazione di comparsa fluida */
            opacity: 0;
            visibility: hidden;
            transform: translateY(-10px);
            transition: opacity 0.3s ease, transform 0.3s ease, visibility 0.3s;
        }

        /* Mostra il menu quando ci si passa sopra */
        .dropdown:hover .dropdown-menu {
            opacity: 1;
            visibility: visible;
            transform: translateY(0);
        }

        .dropdown-menu li {
            border-bottom: 1px solid rgba(255, 255, 255, 0.05);
        }
        .dropdown-menu li:last-child {
            border-bottom: none;       
        }

        /* Stile dei link interni della tendina */
        .dropdown-menu a {
            font-family: 'GutteryFont', sans-serif; 
            font-size: 1.3rem;         
            color: #ffffff;
            text-decoration: none;
            display: block;
            padding: 12px 16px;
            text-align: right;          
            letter-spacing: 0.5px;
            transition: background-color 0.2s ease, color 0.2s ease;
        }

        .dropdown-menu a:hover {
            background-color: rgba(255, 51, 51, 0.15); 
            color: #ff3333;                             
        }

        /* CONTENITORE SCRITTE: Assicura che il testo rimanga SOPRA la striscia di disegni */
        .header-text {
            position: relative;
            z-index: 2;                /* Porta il testo in primo piano */
            pointer-events: none;      /* Evita che il testo interferisca con azioni del mouse */
        }

        .brand-name {
            font-family: 'GutteryFont', sans-serif;
            font-size: 3.8vw;            /* RIPRISTINATO ORIGINALE: Testo grande */
            font-weight: normal;         
            letter-spacing: -1px;        
            word-spacing: 6px;           
            white-space: nowrap;         
            margin-bottom: 10px;         
            text-shadow: 0px 0px 25px rgba(0, 0, 0, 1), 0px 0px 15px rgba(0, 0, 0, 1), 0px 0px 5px rgba(0, 0, 0, 1); 
        }

        .highlight {
            color: #ff3333;              
        }

        /* Stile per il sottotitolo dell'intestazione */
        .subtitle {
            font-family: 'GutteryFont', sans-serif; 
            font-size: 1.8vw;            /* RIPRISTINATO ORIGINALE: Sottotitolo grande */
            font-weight: normal;
            letter-spacing: 1px;         
            word-spacing: 4px;
            color: #ffffff;              
            white-space: nowrap;         
            text-shadow: 0px 0px 20px rgba(0, 0, 0, 1), 0px 0px 10px rgba(0, 0, 0, 1);
        }

        /* LA STRISCIA GRAFICA DI SFONDO (COLLAGE) */
        .header-strip {
            position: absolute;
            top: 50%;
            left: 0;
            transform: translateY(-50%); 
            width: 100%;
            height: 180px;              
            background-color: rgba(10, 10, 10, 0.5); 
            z-index: 1;                 
            overflow: hidden;           
            display: flex;
            align-items: center;
        }

        /* Contenitore interno che esegue l'animazione dello scorrimento */
        .strip-gallery {
            display: flex;
            align-items: center;
            width: max-content;
            animation: scorriStriscia 60s linear infinite; 
        }

        /* Stile comune per tutti i lavori grafici nella striscia */
        .header-strip img {
            height: 150px;              
            width: auto;                
            object-fit: cover;
            opacity: 0.35;              /* RIPRISTINATO ORIGINALE: visibilità 0.35 delle foto */
            filter: grayscale(40%) contrast(110%); 
            margin-right: 0px;          /* RIPRISTINATO: nessuna sovrapposizione errata */
            pointer-events: none;
        }

        /* ANIMAZIONE: Sposta la galleria */
        @keyframes scorriStriscia {
            0% {
                transform: translateX(0);
            }
            100% {
                transform: translateX(-50%);
            }
        }

        /* --- 2. REGOLE SPECIFICHE PER IPAD E TABLET --- */
        @media screen and (min-width: 481px) and (max-width: 1024px) {
            header {
                padding-top: 50px;       
                padding-bottom: 50px;
                min-height: 190px;
            }
            .nav-container {
                top: 10px;             
                right: 25px;
            }
            .dropdown-trigger {
                font-size: 1.6rem;      
            }
            .dropdown-menu a {
                font-size: 1.2rem;
            }
            .header-strip {
                height: 140px;
            }
            .header-strip img {
                height: 120px;
                margin-right: 0px;      
            }
            .brand-name {
                font-size: 6.5vw;        
                letter-spacing: -0.8px;
                word-spacing: 8px;       
            }
            .subtitle {
                font-size: 4.1vw;        
            }
        }

        /* --- 3. REGOLE SPECIFICHE PER IPHONE E SMARTPHONE --- */
        @media screen and (max-width: 480px) {
            header {
                padding-top: 80px;       
                padding-bottom: 40px;
                min-height: 180px;
            }
            .nav-container {
                position: relative;      
                top: 0;
                right: 0;
                margin-bottom: 15px;
                width: 100%;
                display: flex;
                justify-content: center; 
            }
            .dropdown-trigger {
                font-size: 1.7rem;      
                padding: 5px;
            }
            .dropdown-menu {
                right: auto;
                left: 50%;
                transform: translateX(-50%) translateY(-10px); 
            }
            .dropdown:hover .dropdown-menu {
                transform: translateX(-50%) translateY(0);
            }
            .dropdown-menu a {
                text-align: center;      
                font-size: 1.3rem;
            }
            .header-strip {
                height: 110px;
            }
            .header-strip img {
                height: 90px;
                margin-right: 0px;      
            }
            .brand-name {
                font-size: 7.8vw;        
                letter-spacing: -0.5px;  
                word-spacing: 5px;       
            }
            .subtitle {
                font-size: 4.8vw;        
            }
        }
