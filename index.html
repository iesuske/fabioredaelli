<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fabio Redaelli - Comic Art Author - Hot Stuff</title>
    <style>
        /* Definizione del font personalizzato Lobster */
        @font-face {
            font-family: 'Lobster Regular';
            src: url('fonts/lobsteregular.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        /* Reset dei margini e gestione della pagina */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden; /* Blocca lo scroll */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0d1b2a;
        }

        /* 1. SFONDO SFOCATO "AMBIENTALE" */
        .bg-blurred-ambient {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('images/sfondo2.jpg');
            background-size: cover;
            background-position: center;
            filter: blur(15px) brightness(0.6);
            transform: scale(1.1); /* Evita bordi bianchi dovuti alla sfocatura */
            z-index: 1;
        }

        /* 2. OPERA D'ARTE CENTRALE (Con aggiunta di ombra morbida per staccarla dallo sfondo) */
        .bg-main-artwork {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('images/sfondo2.jpg');
            background-size: contain;     /* Garantisce la visione totale dell'auto */
            background-position: center;   /* Centra perfettamente il poster nel monitor */
            background-repeat: no-repeat;
            
            /* L'ombra morbida: scura, espansa di 30px e leggermente trasparente per massima naturalezza */
            filter: drop-shadow(0px 0px 30px rgba(0, 0, 0, 0.65));
            
            z-index: 2;
        }

        /* Overlay per i futuri contenuti del sito */
        .content-overlay {
            position: relative;
            z-index: 3;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            pointer-events: none;
        }

        header {
            padding: 40px;
            pointer-events: auto;
        }

        main {
            flex-grow: 1;
        }

        footer {
            padding: 15px;
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.8);
            pointer-events: auto;
        }
    </style>
</head>
<body>

    <div class="bg-blurred-ambient"></div>

    <div class="bg-main-artwork"></div>

    <div class="content-overlay">
        <header>
            </header>

        <main>
            </main>

        <footer>
            <p>&copy; 2026 Fabio Redaelli - Comic Art Author. Tutti i diritti riservati.</p>
        </footer>
    </div>

</body>
</html>
