<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fabio Redaelli - Comic Art Author - Hot Stuff</title>
    <style>
        @font-face {
            font-family: 'Lobster Regular';
            src: url('fonts/lobsteregular.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fceecb;
        }

        /* LAYER 1 — Sfondo nitido ancorato in alto (Cover) */
        .bg-artwork {
            position: absolute;
            inset: 0;
            background-image: url('images/bg2.jpg');
            background-size: cover;
            background-position: top center;
            background-repeat: no-repeat;
            z-index: 1;
        }

        /* LAYER 2 — Interfaccia utente e Navigazione */
        .content-overlay {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            pointer-events: none;
        }

        header {
            padding: 30px 40px;
            pointer-events: auto;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            width: 100%;
        }

        /* Menu fluttuante */
        .nav-menu {
            display: flex;
            gap: 25px;
            list-style: none;
            background: rgba(13, 27, 42, 0.85);
            padding: 10px 24px;
            border-radius: 30px;
            backdrop-filter: blur(8px);
            border: 1px solid rgba(255, 255, 255, 0.1);
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.4);
        }

        .nav-menu a {
            color: #ffffff;
            text-decoration: none;
            font-size: 0.95rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 1.2px;
            transition: color 0.3s ease, transform 0.2s ease;
        }

        .nav-menu a:hover {
            color: #ff4757;
            transform: translateY(-1px);
        }

        main {
            flex-grow: 1;
            pointer-events: none;
        }

        footer {
            padding: 15px;
            text-align: center;
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.85rem;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.8);
            pointer-events: auto;
            background: rgba(13, 27, 42, 0.4);
            backdrop-filter: blur(4px);
            width: 100%;
        }

        /* Responsive design per schermi piccoli */
        @media (max-width: 768px) {
            header {
                padding: 20px 15px;
                justify-content: center;
            }
            .nav-menu {
                gap: 15px;
                padding: 8px 18px;
            }
            .nav-menu a {
                font-size: 0.85rem;
            }
            footer {
                font-size: 0.8rem;
            }
        }
    </style>
</head>
<body>

    <div class="bg-artwork"></div>

    <div class="content-overlay">
        <header>
            <ul class="nav-menu">
                <li><a href="#portfolio">Portfolio</a></li>
                <li><a href="#about">Chi Sono</a></li>
                <li><a href="#contact">Contatti</a></li>
            </ul>
        </header>

        <main></main>

        <footer>
            <p>&copy; 2026 Fabio Redaelli - Comic Art Author. Tutti i diritti riservati.</p>
        </footer>
    </div>

</body>
</html>
