<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fabio HotStuff Redaelli - Comic Art Author - </title>
    
    <link rel="icon" href="images/favicon.ico" sizes="any">
    <link rel="icon" href="images/favicon.svg" type="image/svg+xml">
    <link rel="apple-touch-icon" href="images/apple-touch-icon.png">
    <link rel="icon" type="image/png" sizes="96x96" href="images/favicon-96x96.png">
    
    <style>
        /* Reset iniziale dei margini del browser */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* Impostazione della pagina con sfondo interamente visibile e centrato */
        body {
            background-image: url('images/sfondo2.jpg');
            background-size: contain;        /* Forza l'immagine a mostrasi interamente senza tagli */
            background-position: center;     /* Centra perfettamente lo sfondo sia in alto/basso che a destra/sinistra */
            background-repeat: no-repeat;    /* Impedisce la duplicazione dell'immagine */
            background-attachment: fixed;    /* Mantiene lo sfondo stabile */
            background-color: #000000;       /* Sfondo nero di riempimento per le bande laterali o verticali avanzate */
            height: 100vh;
            width: 100vw;
            overflow: hidden;                /* Blocca qualsiasi barra di scorrimento */
        }

        /* Contenitore principale vuoto pronto per i futuri sviluppi */
        header {
            width: 100%;
            height: 100vh;
        }
    </style>
</head>
<body>

    <header>
        </header>

</body>
</html>
