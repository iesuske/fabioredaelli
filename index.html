<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fabio Redaelli - Comic Art Author - Hot Stuff</title>
    <style>
        @font-face {
            font-family: 'Lobster Regular';
            src: url('fonts/lobsteregular.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0d1b2a;
        }

        /* LAYER 1 — Sfondo blurrato cover: copre tutto, riempie le bande laterali */
        .bg-blurred {
            position: absolute;
            inset: 0;
            background-image: url('images/sfondo2.jpg');
            background-size: cover;
            background-position: center;
            filter: blur(22px) brightness(0.55);
            transform: scale(1.08);
            z-index: 1;
        }

        /* LAYER 2 — Opera nitida contain: proporzionata, centrata, intatta */
        .bg-artwork {
            position: absolute;
            inset: 0;
            background-image: url('images/sfondo2.jpg');
            background-size: contain;
            background-position: center;
            background-repeat: no-repeat;
            z-index: 2;
        }

        /* LAYER 3 — Contenuti */
        .content-overlay {
            position: relative;
            z-index: 3;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            pointer-events: none;
        }

        header {
            padding: 40px;
            pointer-events: auto;
        }

        main {
            flex-grow: 1;
        }

        footer {
            padding: 15px;
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.8);
            pointer-events: auto;
        }
    </style>
</head>
<body>

    <div class="bg-blurred"></div>
    <div class="bg-artwork"></div>

    <div class="content-overlay">
        <header></header>
        <main></main>
        <footer>
            <p>&copy; 2026 Fabio Redaelli - Comic Art Author. Tutti i diritti riservati.</p>
        </footer>
    </div>

</body>
</html>
