<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fabio Redaelli | Official Site</title>
    
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Anton&display=swap" rel="stylesheet">

    <style>
        /* Reset base per azzerare i margini del browser */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* Sfondo completamente nero e altezza totale della pagina */
        body {
            background-color: #000000;
            color: #ffffff;
            font-family: Arial, sans-serif; /* Font di fallback per i testi normali */
            height: 100vh;
            position: relative;
            overflow: hidden;
        }

        /* Contenitore posizionato in alto a destra */
        .header-brand {
            position: absolute;
            top: 40px;
            right: 60px;
            text-align: right;
        }

        /* Stile del nome gigante con il font Anton */
        .brand-name {
            font-family: 'Anton', sans-serif;
            font-size: 5vw; /* Dimensione fluida che si adatta allo schermo */
            line-height: 0.9;
            text-transform: uppercase;
            letter-spacing: -1px; /* Lettere molto vicine stile agenzia */
            color: #ffffff;
        }

        /* Stile opzionale per far risaltare "Hot Stuff" se vuoi farlo di un altro colore (es. rosso), altrimenti rimane bianco */
        .highlight {
            color: #ff3333; /* Un rosso acceso da fumetto/adv */
        }
    </style>
</head>
<body>

    <header class="header-brand">
        <h1 class="brand-name">
            Fabio <span class="highlight">Hot Stuff</span> Redaelli
        </h1>
    </header>

    </body>
</html>
