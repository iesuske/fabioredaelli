<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fabio Redaelli - Comic Art Author - Hot Stuff</title>
    <style>
        /* Definizione del font personalizzato Lobster */
        @font-face {
            font-family: 'Lobster Regular';
            src: url('fonts/lobsteregular.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        /* Reset dei margini e gestione della pagina */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden; /* Blocca lo scroll */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #0d1b2a;
        }

        /* 1. SFONDO SFOCATO "AMBIENTALE" */
        .bg-blurred-ambient {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('images/sfondo2.jpg');
            background-size: cover;
            background-position: center;
            filter: blur(15px) brightness(0.6);
            transform: scale(1.1);
            z-index: 1;
        }

        /* 2. OPERA D'ARTE CENTRALE */
        .bg-main-artwork {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('images/sfondo2.jpg');
            background-size: contain;     
            background-position: center;   
            background-repeat: no-repeat;
            filter: drop-shadow(0px 0px 30px rgba(0, 0, 0, 0.65));
            z-index: 2;
        }

        /* Overlay per i contenuti del sito (Sopra la grafica) */
        .content-overlay {
            position: relative;
            z-index: 3;
            width: 100%;
            height: 100%;
            pointer-events: none; /* Permette di non intercettare i clic dove non serve */
        }

        /* Navigazione posizionata sopra la banda rossa sul lato destro dell'immagine */
        .top-nav {
            position: absolute;
            /* Agganciamo il menu in base alle proporzioni dell'immagine centrale */
            top: 4.5vh; 
            right: 12%; 
            display: flex;
            gap: 40px; /* Spazio tra "About Me" e "Contact" */
            pointer-events: auto; /* Riattiva i clic per i link */
        }

        /* Stile dei link del Menu con il font Lobster */
        .nav-link {
            font-family: 'Lobster Regular', cursive;
            font-size: 2.2rem; /* Dimensione generosa come da screenshot */
            color: #ffffff;
            text-decoration: none;
            transition: transform 0.2s ease, color 0.2s ease;
            text-shadow: 2px 2px 4px rgba(0, 0, 0, 0.4); /* Leggera ombra per staccare dal rosso */
        }

        /* Effetto al passaggio del mouse (Hover) */
        .nav-link:hover {
            color: #fbc02d; /* Si illumina di un giallo caldo che richiama la scritta Hot Stuff */
            transform: scale(1.05); /* Piccolo ingrandimento fluido */
        }

        footer {
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 15px;
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.8);
            pointer-events: auto;
        }
    </style>
</head>
<body>

    <div class="bg-blurred-ambient"></div>

    <div class="bg-main-artwork"></div>

    <div class="content-overlay">
        <nav class="top-nav">
            <a href="#about" class="nav-link">About Me</a>
            <a href="#contact" class="nav-link">Contact</a>
        </nav>

        <footer>
            <p>&copy; 2026 Fabio Redaelli - Comic Art Author. Tutti i diritti riservati.</p>
        </footer>
    </div>

</body>
</html>
