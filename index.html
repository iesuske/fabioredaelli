<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fabio Hot Stuff Redaelli</title>
    <style>
        @font-face {
            font-family: 'Lobster Regular';
            src: url('fonts/lobsteregular.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fceecb;
        }

        /* LAYER 1 — Sfondo */
        .bg-artwork {
            position: absolute;
            inset: 0;
            background-image: url('images/bg2.jpg');
            background-size: cover;
            background-position: center 18%; 
            background-repeat: no-repeat;
            z-index: 1;
        }

        /* LAYER 2 — Contenuti sopra lo sfondo */
        .content-overlay {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            pointer-events: none;
        }

        header {
            width: 100%;
            margin-top: 45px; 
            height: 110px;
            padding: 0 4%;
            pointer-events: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
            position: relative; /* Permette il posizionamento assoluto dei figli se necessario */
        }

        .header-spacer {
            flex: 1;
        }

        /* Titolo della banda */
        .brand-title {
            font-family: 'Lobster Regular', cursive;
            font-size: 5.5rem; 
            letter-spacing: 1px;
            text-align: center;
            white-space: nowrap;
            line-height: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            flex: 3;
            text-shadow: 1px 2px 4px rgba(0, 0, 0, 0.2);
        }

        /* Spaziature per staccare nettamente Hot Stuff */
        .brand-title .text-black {
            margin: 0 24px; 
        }

        .text-white {
            color: #ffffff;
        }

        .text-black {
            color: #000000;
        }

        /* Navigazione Contact Me sulla destra - Spostata sotto nella parte beige */
        .nav-container {
            flex: 1;
            display: flex;
            justify-content: flex-end;
            align-items: center;
            transform: translateY(90px); /* Spinge l'intero blocco Contact Me sotto la riga rossa/nera nella zona beige */
        }

        .dropdown {
            position: relative;
            display: inline-block;
        }

        .dropdown-trigger {
            font-family: 'Lobster Regular', cursive;
            color: #000000; /* Cambiato in nero o colore scuro per essere leggibile sul fondo beige */
            font-size: 1.8rem;
            text-decoration: none;
            cursor: pointer;
            padding: 10px 15px;
            transition: opacity 0.2s ease;
            white-space: nowrap;
            text-shadow: 1px 1px 2px rgba(255, 255, 255, 0.6);
        }

        .dropdown-trigger:hover {
            opacity: 0.75;
        }

        /* Menu a tendina dei social - Segue l'incolonnamento sotto il Contact Me beige */
        .dropdown-menu {
            display: none;
            position: absolute;
            right: 0;
            top: 100%; /* Si apre esattamente sotto il trigger */
            margin-top: 5px;
            background: rgba(13, 27, 42, 0.96);
            min-width: 180px;
            box-shadow: 0px 8px 24px rgba(0,0,0,0.35);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(8px);
            list-style: none;
            padding: 6px 0;
            z-index: 999;
        }

        .dropdown-menu li a {
            color: #ffffff;
            padding: 12px 20px;
            text-decoration: none;
            display: block;
            font-size: 0.95rem;
            font-weight: 600;
            transition: background 0.2s ease;
        }

        .dropdown-menu li a:hover {
            background: #ff4757;
        }

        .dropdown:hover .dropdown-menu {
            display: block;
            animation: fadeInDropdown 0.2s ease;
        }

        @keyframes fadeInDropdown {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        main {
            flex-grow: 1;
            pointer-events: none;
        }

        footer {
            padding: 15px;
            text-align: center;
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.85rem;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.8);
            pointer-events: auto;
            background: rgba(13, 27, 42, 0.4);
            backdrop-filter: blur(4px);
            width: 100%;
        }

        /* Gestione responsive dell'incolonnamento */
        @media (max-width: 1200px) {
            header { margin-top: 40px; height: 90px; }
            .brand-title { font-size: 4.2rem; }
            .bg-artwork { background-position: center 16%; }
            .nav-container { transform: translateY(70px); }
        }

        @media (max-width: 900px) {
            header { margin-top: 30px; height: 75px; }
            .brand-title { font-size: 3rem; }
            .brand-title .text-black { margin: 0 14px; }
            .dropdown-trigger { font-size: 1.4rem; }
            .bg-artwork { background-position: center 14%; }
            .nav-container { transform: translateY(55px); }
        }

        @media (max-width: 768px) {
            header { margin-top: 25px; height: 60px; padding: 0 2%; }
            .brand-title { font-size: 2.2rem; }
            .brand-title .text-black { margin: 0 10px; }
            .dropdown-trigger { font-size: 1.1rem; }
            .dropdown-menu { min-width: 140px; }
            .dropdown-menu li a { padding: 10px 15px; font-size: 0.85rem; }
            .bg-artwork { background-position: center center; }
            .nav-container { transform: translateY(45px); }
        }
    </style>
</head>
<body>

    <div class="bg-artwork"></div>

    <div class="content-overlay">
        <header>
            <div class="header-spacer"></div>

            <h1 class="brand-title">
                <span class="text-white">Fabio</span><span class="text-black">Hot Stuff</span><span class="text-white">Redaelli</span>
            </h1>

            <nav class="nav-container">
                <div class="dropdown">
                    <a class="dropdown-trigger">Contact Me</a>
                    <ul class="dropdown-menu">
                        <li><a href="#instagram">Instagram</a></li>
                        <li><a href="#facebook">Facebook</a></li>
                        <li><a href="#telegram">Telegram</a></li>
                        <li><a href="#whatsapp">WhatsApp</a></li>
                    </ul>
                </div>
            </nav>
        </header>

        <main></main>

        <footer>
            <p>&copy; 2026 Fabio Redaelli - Comic Art Author. Tutti i diritti riservati.</p>
        </footer>
    </div>

</body>
</html>
