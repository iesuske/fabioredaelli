<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fabio Redaelli - Comic Art Author - Hot Stuff</title>
    <style>
        @font-face {
            font-family: 'Lobster Regular';
            src: url('fonts/lobsteregular.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fceecb;
        }

        /* LAYER 1 — Sfondo nitido a tutto schermo ancorato in alto */
        .bg-artwork {
            position: absolute;
            inset: 0;
            background-image: url('images/bg2.jpg');
            background-size: cover;
            background-position: top center;
            background-repeat: no-repeat;
            z-index: 1;
        }

        /* LAYER 2 — Contenuti e Interfaccia sopra lo sfondo */
        .content-overlay {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            pointer-events: none;
        }

        /* L'header simula l'altezza e la posizione esatta della banda rossa sul fondo */
        header {
            width: 100%;
            height: 140px; /* Altezza ottimale per contenere il testo dentro la banda */
            margin-top: 35px; /* Spinge il testo esattamente al centro della fascia rossa dell'immagine */
            padding: 0 20px;
            pointer-events: auto;
            display: flex;
            justify-content: center;
            align-items: center;
        }

        /* Titolo ingrandito e centrato con font Lobster */
        .brand-title {
            font-family: 'Lobster Regular', cursive;
            font-size: 5.5rem; /* Ingrandito per occupare bene la banda */
            letter-spacing: 2px;
            text-align: center;
            white-space: nowrap;
            line-height: 1;
        }

        /* Colori alternati richiesti */
        .text-white {
            color: #ffffff;
        }

        .text-black {
            color: #000000;
            margin: 0 20px; /* Spazio proporzionato tra le parole */
        }

        main {
            flex-grow: 1;
            pointer-events: none;
        }

        footer {
            padding: 15px;
            text-align: center;
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.85rem;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.8);
            pointer-events: auto;
            background: rgba(13, 27, 42, 0.4);
            backdrop-filter: blur(4px);
            width: 100%;
        }

        /* Controllo responsive avanzato: riduce il testo e i margini prima che tocchino i bordi */
        @media (max-width: 1200px) {
            .brand-title {
                font-size: 4.2rem;
            }
            header {
                height: 110px;
                margin-top: 25px;
            }
        }

        @media (max-width: 768px) {
            header {
                height: 80px;
                margin-top: 15px;
                padding: 0 10px;
            }
            .brand-title {
                font-size: 2.5rem;
                letter-spacing: 1px;
            }
            .text-black {
                margin: 0 10px;
            }
            footer {
                font-size: 0.8rem;
            }
        }

        @media (max-width: 480px) {
            header {
                height: 60px;
                margin-top: 10px;
            }
            .brand-title {
                font-size: 1.8rem;
            }
            .text-black {
                margin: 0 6px;
            }
        }
    </style>
</head>
<body>

    <div class="bg-artwork"></div>

    <div class="content-overlay">
        <header>
            <h1 class="brand-title">
                <span class="text-white">Fabio</span><span class="text-black">Hot Stuff</span><span class="text-white">Redaelli</span>
            </h1>
        </header>

        <main></main>

        <footer>
            <p>&copy; 2026 Fabio Redaelli - Comic Art Author. Tutti i diritti riservati.</p>
        </footer>
    </div>

</body>
</html>
