<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Soluzione Layout - Ripristino Allineamento</title>
    <style>
        /* Reset e stili di base per evitare conflitti */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
            background-color: #f4f7f6;
            color: #333;
            line-height: 1.6;
            padding: 20px;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
        }

        /* Container principale della scheda */
        .card-container {
            background: #ffffff;
            border-radius: 12px;
            box-shadow: 0 4px 20px rgba(0, 0, 0, 0.08);
            max-width: 450px;
            width: 100%;
            padding: 24px;
            transition: transform 0.2s ease;
        }

        .card-container:hover {
            transform: translateY(-2px);
        }

        /* Header della scheda */
        .card-header {
            margin-bottom: 16px;
            border-bottom: 1px solid #edf2f7;
            padding-bottom: 12px;
        }

        .card-title {
            font-size: 1.4rem;
            color: #1a202c;
            font-weight: 700;
        }

        /* Contenuto e fix del Flexbox */
        .card-content {
            display: flex;
            flex-direction: column;
            gap: 12px;
            margin-bottom: 24px;
        }

        /* Wrapper dei dati con allineamento corretto */
        .data-row {
            display: flex;
            justify-content: space-between;
            align-items: center;
            background: #f8fafc;
            padding: 10px 14px;
            border-radius: 8px;
            border: 1px solid #e2e8f0;
        }

        .data-label {
            font-weight: 500;
            color: #64748b;
            font-size: 0.9rem;
        }

        .data-value {
            font-weight: 600;
            color: #0f172a;
            font-size: 0.95rem;
            text-align: right;
        }

        /* Evidenziazione per valori importanti (es. Totale) */
        .data-row.highlight {
            background: #e0f2fe;
            border-color: #bae6fd;
        }

        .data-row.highlight .data-value {
            color: #0369a1;
            font-size: 1.1rem;
        }

        /* Pulsante di azione principale */
        .action-button {
            display: block;
            width: 100%;
            background-color: #2563eb;
            color: white;
            border: none;
            padding: 12px 20px;
            font-size: 1rem;
            font-weight: 600;
            border-radius: 8px;
            cursor: pointer;
            transition: background-color 0.2s ease, box-shadow 0.2s ease;
            text-align: center;
        }

        .action-button:hover {
            background-color: #1d4ed8;
            box-shadow: 0 4px 12px rgba(37, 99, 235, 0.2);
        }

        .action-button:active {
            background-color: #1e40af;
        }
    </style>
</head>
<body>

    <div class="card-container">
        <div class="card-header">
            <h2 class="card-title">Riepilogo Operazione</h2>
        </div>
        
        <div class="card-content">
            <div class="data-row">
                <span class="data-label">Stato Connessione</span>
                <span class="data-value" style="color: #16a34a;">Attivo</span>
            </div>
            
            <div class="data-row">
                <span class="data-label">ID Transazione</span>
                <span class="data-value">#TRX-948201</span>
            </div>
            
            <div class="data-row">
                <span class="data-label">Data Ricezione</span>
                <span class="data-value" id="current-date">--/--/----</span>
            </div>
            
            <div class="data-row highlight">
                <span class="data-label">Totale Ricevuto</span>
                <span class="data-value">€ 1.250,00</span>
            </div>
        </div>

        <button class="action-button" id="btn-conferma">Conferma e Invia</button>
    </div>

    <script>
        // Inserisce automaticamente la data odierna nel formato corretto
        document.addEventListener('DOMContentLoaded', () => {
            const dateElement = document.getElementById('current-date');
            const oggi = new Date();
            const opzioni = { day: '2-digit', month: '2-digit', year: 'numeric' };
            dateElement.textContent = oggi.toLocaleDateString('it-IT', opzioni);

            // Gestore evento per il pulsante
            const button = document.getElementById('btn-conferma');
            button.addEventListener('click', () => {
                alert('Operazione confermata con successo!');
            });
        });
    </script>

</body>
</html>
