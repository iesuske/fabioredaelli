<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fabio Redaelli - Comic Art Author - Hot Stuff</title>
    <style>
        /* Definizione del font personalizzato Lobster */
        @font-face {
            font-family: 'Lobster Regular';
            src: url('fonts/lobsteregular.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        /* Reset dei margini */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden; /* Evita lo scroll */
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Il colore di base del body riprende l'azzurro del cielo dell'illustrazione */
            background-color: #61bcd1; 
        }

        /* 1. CREIAMO LA PROLUNGA ROSSA IN ALTO */
        /* Questa barra si estende da sinistra a destra all'infinito dietro l'immagine, 
           fondendosi con la tua banda rossa originale */
        .top-red-bar {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            /* L'altezza è calcolata per combaciare perfettamente con lo spessore del tuo rosso su desktop */
            height: 13.5vh; 
            background-color: #b31c19; /* Lo stesso rosso del tuo disegno */
            z-index: 1;
        }

        /* 2. IL CONTENITORE DELL'ILLUSTRAZIONE */
        .bg-container {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('images/sfondo2.jpg');
            background-size: contain;        /* Mostra l'immagine intera senza tagliarla sotto */
            background-position: top center;  /* La tiene attaccata al soffitto per allineare il rosso */
            background-repeat: no-repeat;
            z-index: 2;                       /* Sta sopra alla prolunga rossa */
        }

        /* Overlay per i contenuti futuri (Menu, Ticker, Contatti) */
        .content-overlay {
            position: relative;
            z-index: 3;                       /* Sopra a tutto il comparto grafico */
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            pointer-events: none;
        }

        header {
            padding: 40px;
            pointer-events: auto;
        }

        main {
            flex-grow: 1;
        }

        footer {
            padding: 15px;
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.6);
            pointer-events: auto;
        }
    </style>
</head>
<body>

    <div class="top-red-bar"></div>

    <div class="bg-container"></div>

    <div class="content-overlay">
        <header>
            </header>

        <main>
            </main>

        <footer>
            <p>&copy; 2026 Fabio Redaelli - Comic Art Author. Tutti i diritti riservati.</p>
        </footer>
    </div>

</body>
</html>
