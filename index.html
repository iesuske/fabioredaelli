<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fabio Redaelli - Comic Art Author - Hot Stuff</title>
    <style>
        @font-face {
            font-family: 'Lobster Regular';
            src: url('fonts/lobsteregular.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fceecb;
        }

        /* LAYER 1 — Sfondo nitido a tutto schermo ancorato perfettamente in alto */
        .bg-artwork {
            position: absolute;
            inset: 0;
            background-image: url('images/bg2.jpg');
            background-size: cover;
            background-position: top center;
            background-repeat: no-repeat;
            z-index: 1;
        }

        /* LAYER 2 — Interfaccia utente */
        .content-overlay {
            position: relative;
            z-index: 2;
            width: 100%;
            height: 100%;
            display: flex;
            flex-direction: column;
            justify-content: space-between;
            pointer-events: none;
        }

        /* L'header si sovrappone millimetricamente alla banda rossa dello sfondo */
        header {
            width: 100%;
            margin-top: 3.5vw; /* Allineamento proporzionale perfetto basato sullo screenshot */
            height: 9vw;
            min-height: 70px;
            max-height: 140px;
            padding: 0 4%;
            pointer-events: auto;
            display: flex;
            justify-content: space-between;
            align-items: center;
        }

        /* Spaziatore per garantire che il titolo rimanga perfettamente al centro dello schermo */
        .header-spacer {
            flex: 1;
        }

        /* Il titolo fisso all'interno della banda rossa */
        .brand-title {
            font-family: 'Lobster Regular', cursive;
            font-size: 5rem; /* Dimensione imponente come nei primi test */
            letter-spacing: 1px;
            text-align: center;
            white-space: nowrap;
            line-height: 1;
            display: flex;
            justify-content: center;
            align-items: center;
            flex: 3;
            text-shadow: 1px 2px 4px rgba(0, 0, 0, 0.25);
        }

        /* Ripristino dei colori corretti per la banda rossa */
        .text-white {
            color: #ffffff;
        }

        .text-black {
            color: #000000;
            margin: 0 20px;
        }

        /* Navigazione Contact Me allineata a destra dentro la banda */
        .nav-container {
            flex: 1;
            display: flex;
            justify-content: flex-end;
            align-items: center;
        }

        .dropdown {
            position: relative;
            display: inline-block;
        }

        /* "Contact Me" torna Bianco ed elegante dentro il rosso */
        .dropdown-trigger {
            font-family: 'Lobster Regular', cursive;
            color: #ffffff;
            font-size: 2.2rem;
            text-decoration: none;
            cursor: pointer;
            padding: 10px 15px;
            transition: transform 0.2s ease, opacity 0.2s ease;
            white-space: nowrap;
            text-shadow: 1px 2px 4px rgba(0, 0, 0, 0.25);
        }

        .dropdown-trigger:hover {
            opacity: 0.9;
            transform: scale(1.02);
        }

        /* Menu a tendina che scende */
        .dropdown-menu {
            display: none;
            position: absolute;
            right: 0;
            top: 100%;
            margin-top: 10px;
            background: rgba(13, 27, 42, 0.98);
            min-width: 190px;
            box-shadow: 0px 8px 25px rgba(0, 0, 0, 0.4);
            border-radius: 12px;
            overflow: hidden;
            border: 1px solid rgba(255, 255, 255, 0.1);
            backdrop-filter: blur(10px);
            list-style: none;
            padding: 6px 0;
            z-index: 100;
        }

        .dropdown-menu li a {
            color: #ffffff;
            padding: 12px 20px;
            text-decoration: none;
            display: block;
            font-size: 0.95rem;
            font-weight: 600;
            letter-spacing: 0.5px;
            transition: background 0.2s ease;
        }

        .dropdown-menu li a:hover {
            background: #ff4757;
        }

        .dropdown:hover .dropdown-menu {
            display: block;
            animation: fadeInDropdown 0.25s ease forwards;
        }

        @keyframes fadeInDropdown {
            from { opacity: 0; transform: translateY(8px); }
            to { opacity: 1; transform: translateY(0); }
        }

        main {
            flex-grow: 1;
            pointer-events: none;
        }

        footer {
            padding: 15px;
            text-align: center;
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.85rem;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.8);
            pointer-events: auto;
            background: rgba(13, 27, 42, 0.4);
            backdrop-filter: blur(4px);
            width: 100%;
        }

        /* Gestione fluida e reattiva per i vari monitor */
        @media (max-width: 1400px) {
            .brand-title { font-size: 4rem; }
            .dropdown-trigger { font-size: 1.9rem; }
        }

        @media (max-width: 1024px) {
            header { margin-top: 3.8vw; height: 10vw; }
            .brand-title { font-size: 4.5vw; }
            .text-black { margin: 0 12px; }
            .dropdown-trigger { font-size: 2.2vw; }
        }

        @media (max-width: 768px) {
            header { margin-top: 4vw; height: 11vw; padding: 0 2%; }
            .brand-title { font-size: 5vw; }
            .dropdown-trigger { font-size: 2.5vw; padding: 5px; }
            .dropdown-menu { min-width: 150px; }
            .dropdown-menu li a { padding: 10px 15px; font-size: 0.85rem; }
        }
    </style>
</head>
<body>

    <div class="bg-artwork"></div>

    <div class="content-overlay">
        <header>
            <div class="header-spacer"></div>

            <h1 class="brand-title">
                <span class="text-white">Fabio</span><span class="text-black">Hot Stuff</span><span class="text-white">Redaelli</span>
            </h1>

            <nav class="nav-container">
                <div class="dropdown">
                    <a class="dropdown-trigger">Contact Me</a>
                    <ul class="dropdown-menu">
                        <li><a href="#instagram">Instagram</a></li>
                        <li><a href="#facebook">Facebook</a></li>
                        <li><a href="#telegram">Telegram</a></li>
                        <li><a href="#whatsapp">WhatsApp</a></li>
                    </ul>
                </div>
            </nav>
        </header>

        <main></main>

        <footer>
            <p>&copy; 2026 Fabio Redaelli - Comic Art Author. Tutti i diritti riservati.</p>
        </footer>
    </div>

</body>
</html>
