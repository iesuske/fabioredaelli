<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fabio Hot Stuff Redaelli</title>
    
    <style>
        /* Reset iniziale dei margini del browser */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* Registriamo il font che hai caricato su GitHub */
        @font-face {
            font-family: 'GutteryFont';
            src: url('fonts/guttery.otf');
            font-weight: normal;
            font-style: normal;
        }

        /* --- 1. STILE DI BASE (DESKTOP) --- */
        body {
            background-color: #000000;
            color: #ffffff;
            height: 100vh;
            display: flex;
            flex-direction: column;
            align-items: center;       /* Centra orizzontalmente tutto il contenuto della pagina */
            justify-content: flex-start; /* Fa partire il contenuto dall'alto */
            overflow: hidden;
        }

        /* L'intestazione principale (Titolo della Home) */
        header {
            position: relative;        /* Necessario per posizionare la striscia dietro al testo */
            display: flex;
            flex-direction: column;    /* Incolonna il nome e il sottotitolo */
            align-items: center;       /* Centra perfettamente gli elementi tra di loro */
            justify-content: center;   /* Centra il testo verticalmente rispetto alla banda */
            text-align: center;
            padding-top: 60px;         /* Distanza dal bordo superiore dello schermo */
            padding-bottom: 60px;
            width: 100%;
            min-height: 240px;         /* Altezza per contenere comodamente la striscia grafica */
        }

        /* CONTENITORE SCRITTE: Assicura che il testo rimanga SOPRA la striscia di disegni */
        .header-text {
            position: relative;
            z-index: 2;                /* Porta il testo in primo piano */
            pointer-events: none;      /* Evita che il testo interferisca con azioni del mouse */
        }

        .brand-name {
            font-family: 'GutteryFont', sans-serif;
            font-size: 2.8vw;            /* Dimensione proporzionale per monitor PC */
            font-weight: normal;         /* Toglie il grassetto automatico del tag h1 */
            letter-spacing: -1px;        /* Lettere vicine all'interno della parola */
            word-spacing: 6px;           /* Spaziatura tra le parole */
            white-space: nowrap;         /* Mantiene tutto su una sola riga */
            margin-bottom: 10px;         /* Spazio tra il titolo principale e il sottotitolo */
            text-shadow: 0px 0px 20px rgba(0, 0, 0, 0.9), 0px 0px 10px rgba(0, 0, 0, 0.9); /* Ombra pronunciata anti-disturbo */
        }

        .highlight {
            color: #ff3333;              /* Rosso acceso per "Hot Stuff" */
        }

        /* Stile per il sottotitolo dell'intestazione */
        .subtitle {
            font-family: 'GutteryFont', sans-serif; /* Stesso identico font del titolo */
            font-size: 1.3vw;            /* Dimensione più piccola */
            font-weight: normal;
            letter-spacing: 1px;         
            word-spacing: 4px;
            color: #ffffff;              /* Bianco puro */
            white-space: nowrap;         /* Mantiene anche il sottotitolo su una riga */
            text-shadow: 0px 0px 15px rgba(0, 0, 0, 0.9);
        }

        /* LA STRISCIA GRAFICA DI SFONDO (COLLAGE) */
        .header-strip {
            position: absolute;
            top: 50%;
            left: 0;
            transform: translateY(-50%); /* Centra la striscia verticalmente rispetto all'header */
            width: 100%;
            height: 180px;              /* Altezza della banda con i disegni */
            background-color: rgba(10, 10, 10, 0.5); /* Sfondo scuro trasparente d'unione */
            z-index: 1;                 /* Rimane dietro al testo */
            overflow: hidden;           /* Taglia i disegni se escono dai bordi */
            display: flex;
            align-items: center;
            justify-content: flex-start;
        }

        /* Contenitore interno per allineare e fondere le immagini */
        .strip-gallery {
            display: flex;
            align-items: center;
            width: max-content;
            padding-right: 50px;
        }

        /* Stile comune per tutti i 20 lavori grafici nella striscia */
        .header-strip img {
            height: 150px;              /* Altezza uniforme per l'allineamento orizzontale */
            width: auto;                /* Mantiene le proporzioni corrette di ogni disegno */
            object-fit: cover;
            opacity: 0.20;              /* Trasparenza per l'effetto d'atmosfera accennato */
            filter: grayscale(40%) contrast(110%); /* Desatura parzialmente per valorizzare il rosso del nome */
            margin-left: -25px;         /* Sovrapposizione reciproca ad effetto collage sfalsato */
            mix-blend-mode: lighten;    /* Fonde piacevolmente le immagini sui toni scuri */
            pointer-events: none;
        }

        /* --- 2. REGOLE SPECIFICHE PER IPAD E TABLET --- */
        @media screen and (min-width: 481px) and (max-width: 1024px) {
            header {
                padding-top: 50px;       
                padding-bottom: 50px;
                min-height: 190px;
            }
            .header-strip {
                height: 140px;
            }
            .header-strip img {
                height: 120px;
                margin-left: -18px;
            }
            .brand-name {
                font-size: 4.5vw;        
                letter-spacing: -0.8px;
                word-spacing: 8px;       
            }
            .subtitle {
                font-size: 2.1vw;
            }
        }

        /* --- 3. REGOLE SPECIFICHE PER IPHONE E SMARTPHONE --- */
        @media screen and (max-width: 480px) {
            header {
                padding-top: 40px;       
                padding-bottom: 40px;
                min-height: 150px;
            }
            .header-strip {
                height: 110px;
            }
            .header-strip img {
                height: 90px;
                margin-left: -12px;
            }
            .brand-name {
                font-size: 5.8vw;        
                letter-spacing: -0.5px;  
                word-spacing: 5px;       
            }
            .subtitle {
                font-size: 2.8vw;
            }
        }
    </style>
</head>
<body>
