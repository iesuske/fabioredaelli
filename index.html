<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fabio Redaelli - Comic Art Author - Hot Stuff</title>
    <style>
        /* Definizione del font personalizzato Lobster */
        @font-face {
            font-family: 'Lobster Regular';
            src: url('fonts/lobsteregular.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        /* Reset dei margini */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            /* Usiamo l'azzurro esatto del retino per lo sfondo */
            background-color: #63bdd2; 
        }

        /* 1. SFONDO SFOCATO AMBIENTALE (Mantiene la profondità) */
        .bg-blurred-ambient {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('images/sfondo2.jpg');
            background-size: cover;
            background-position: center;
            filter: blur(12px) brightness(0.65);
            transform: scale(1.1);
            z-index: 1;
        }

        /* 2. OPERA D'ARTE CENTRALE CON BORDI SFUMATI ANCI-SCALINO */
        .bg-main-artwork {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
            background-image: url('images/sfondo2.jpg');
            background-size: contain;     
            background-position: center;   
            background-repeat: no-repeat;
            z-index: 2;

            /* MASCHERA GRADIENTE: Sfuma i bordi laterali per eliminare il taglio netto della foto */
            -webkit-mask-image: linear-gradient(to right, transparent 0%, black 15%, black 85%, transparent 100%);
            mask-image: linear-gradient(to right, transparent 0%, black 15%, black 85%, transparent 100%);
        }

        /* Navigazione dinamica agganciata alla fascia rossa */
        .top-nav {
            position: absolute;
            top: 15.5%; 
            right: 17%; 
            display: flex;
            gap: 40px; 
            pointer-events: auto; 
        }

        .nav-link {
            font-family: 'Lobster Regular', cursive;
            font-size: 2.2rem;
            color: #ffffff;
            text-decoration: none;
            transition: transform 0.2s ease, color 0.2s ease;
            text-shadow: 2px 2px 5px rgba(0, 0, 0, 0.7); 
        }

        .nav-link:hover {
            color: #fbc02d; 
            transform: scale(1.05); 
        }

        footer {
            position: absolute;
            bottom: 0;
            width: 100%;
            padding: 15px;
            text-align: center;
            color: rgba(255, 255, 255, 0.8);
            font-size: 0.9rem;
            text-shadow: 1px 1px 4px rgba(0, 0, 0, 0.8);
            pointer-events: auto;
            z-index: 3;
        }
    </style>
</head>
<body>

    <div class="bg-blurred-ambient"></div>

    <div class="bg-main-artwork">
        <nav class="top-nav">
            <a href="#about" class="nav-link">About Me</a>
            <a href="#contact" class="nav-link">Contact</a>
        </nav>
    </div>

    <footer>
        <p>&copy; 2026 Fabio Redaelli - Comic Art Author. Tutti i diritti riservati.</p>
    </footer>

</body>
</html>
