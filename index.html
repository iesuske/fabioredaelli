<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fabio Hot Stuff Redaelli - Comic Art Author -</title>
    <style>
        @font-face {
            font-family: 'Lobster Regular';
            src: url('fonts/lobsteregular.ttf') format('truetype');
            font-weight: normal;
            font-style: normal;
        }

        * { box-sizing: border-box; margin: 0; padding: 0; }

        html, body {
            width: 100%; height: 100%;
            overflow-x: hidden;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            background-color: #fceecb;
        }

        .bg-artwork {
            position: absolute; inset: 0;
            background-image: url('images/bg2.jpg');
            background-size: cover;
            background-position: center 18%; 
            background-repeat: no-repeat;
            z-index: 1;
        }

        .content-overlay {
            position: relative; z-index: 2;
            width: 100%; height: 100%;
            display: flex; flex-direction: column; justify-content: space-between;
            pointer-events: none;
        }

        header {
            width: 100%; margin-top: 52px; padding: 0 4%;
            pointer-events: auto; display: flex; justify-content: center;
        }

        .brand-title {
            font-family: 'Lobster Regular', cursive;
            font-size: 5.5rem; text-align: center;
            white-space: nowrap; line-height: 1.2;
            text-shadow: 1px 2px 4px rgba(0, 0, 0, 0.2);
        }

        .text-white { color: #ffffff; }
        .text-black { color: #000000; }

        .sub-nav {
            width: 100%; padding: 0 4%;
            display: flex; justify-content: flex-end; 
            gap: 3cm; pointer-events: auto;
        }

        .dropdown { position: relative; display: inline-block; }

        .dropdown-trigger {
            font-family: 'Lobster Regular', cursive;
            color: #ffffff; font-size: 1.8rem;
            text-decoration: none; cursor: pointer;
            padding: 10px 15px;
            text-shadow: 1px 2px 4px rgba(0, 0, 0, 0.4);
        }

        .dropdown:hover .dropdown-trigger { color: #b72216; }

        /* MENU FISSO E STRETTO */
        .dropdown-menu {
            display: none; 
            position: absolute;
            left: 0; /* Allineato a sinistra del contenitore dropdown */
            top: 100%; 
            margin-top: 5px; 
            background: #000000; 
            box-shadow: 0px 8px 16px rgba(0,0,0,0.5);
            border-radius: 20px;
            border: none;
            list-style: none;
            padding: 5px 0; 
            z-index: 10;
            width: 190px; /* Larghezza fissa ristretta */
            overflow: hidden;
        }

        .dropdown-menu li { width: 100%; }

        .dropdown-menu li a {
            font-family: 'Lobster Regular', cursive;
            color: #ffffff; 
            padding: 6px 10px; /* Voci distanziate ma contenute */
            text-decoration: none;
            display: block;
            width: 100%;
            font-size: 1.2rem; 
            text-align: center; 
            transition: background 0s;
        }

        .dropdown-menu li a:hover {
            background-color: #b72216 !important;
        }

        .dropdown:hover .dropdown-menu { display: block; }

        footer {
            padding: 15px; text-align: center;
            color: rgba(255, 255, 255, 0.9);
            font-size: 0.85rem; pointer-events: auto;
            background: rgba(13, 27, 42, 0.6);
            backdrop-filter: blur(4px);
        }
    </style>
</head>
<body>
    <div class="bg-artwork"></div>
    <div class="content-overlay">
        <header>
            <h1 class="brand-title">
                <span class="text-white">Fabio</span>&nbsp;<span class="text-black">Hot Stuff</span>&nbsp;<span class="text-white">Redaelli</span>
            </h1>
        </header>

        <div class="sub-nav">
            <div class="dropdown">
                <a class="dropdown-trigger">About Me</a>
                <ul class="dropdown-menu">
                    <li><a href="#about">Chi sono</a></li>
                </ul>
            </div>

            <div class="dropdown">
                <a class="dropdown-trigger">Contact Me</a>
                <ul class="dropdown-menu">
                    <li><a href="#instagram">Instagram</a></li>
                    <li><a href="#facebook">Facebook</a></li>
                    <li><a href="#telegram">Telegram</a></li>
                    <li><a href="#whatsapp">WhatsApp</a></li>
                </ul>
            </div>
        </div>
        <main></main>
        <footer>
            <p>Copyright 2026 Fabio Redaelli - Comic Art Author. Tutti i diritti riservati.</p>
        </footer>
    </div>
</body>
</html>
