<!DOCTYPE html>
<html lang="it">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fabio Hot Stuff Redaelli</title>
    
    <style>
        /* Reset iniziale dei margini del browser */
        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        /* Registriamo il font che hai caricato su GitHub */
        @font-face {
            font-family: 'GutteryFont';
            src: url('fonts/guttery.otf');
            font-weight: normal;
            font-style: normal;
        }

        /* --- STILE DI BASE (DESKTOP) --- */
        body {
            background-color: #000000;
            color: #ffffff;
            height: 100vh;
            display: flex;
            justify-content: flex-start; /* Allinea a sinistra */
            align-items: flex-start;     /* Allinea in alto */
            padding: 60px;               /* Distanza generosa dai bordi su PC */
            overflow: hidden;
        }

        .brand-name {
            font-family: 'GutteryFont', sans-serif;
            font-size: 2.8vw;            /* Dimensione proporzionata per Desktop */
            text-transform: uppercase;
            letter-spacing: -1px;
            text-align: left;
            white-space: nowrap;         /* Forza il testo su una riga sola */
        }

        .highlight {
            color: #ff3333;              /* Rosso acceso */
        }

        /* --- REGOLE SPECIFICHE PER IPHONE E SMARTPHONE --- */
        @media screen and (max-width: 480px) {
            body {
                padding-top: 35px;       /* Distanza dall'alto dello schermo dello smartphone */
                padding-left: 10px;      /* Spostiamo la scritta al massimo verso sinistra */
                padding-right: 10px;
            }

            .brand-name {
                font-size: 5.8vw;        /* Font decisamente più grande e d'impatto su iPhone */
                letter-spacing: -0.5px;  /* Mantiene le lettere compatte anche su mobile */
            }
        }
    </style>
</head>
<body>

    <h1 class="brand-name">
        Fabio <span class="highlight">Hot Stuff</span> Redaelli
    </h1>

</body>
</html>
